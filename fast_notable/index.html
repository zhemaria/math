  <body>
    <div id="quiz-container">
      <div class="quiz-progress-header">
        <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
      </div>
      <div id="question-area"></div>
      <div class="timer-container" id="timer-container">
        <div class="timer-text" id="timer-text">&#9201; Tiempo: 40s</div>
        <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
      </div>
      <div class="result-screen hidden" id="result-screen">
        <h2>&#127919; &iexcl;Cuestionario completado!</h2>
        <p class="result-score" id="final-score"></p>
        <p class="result-msg" id="final-msg"></p>
        <div class="cat-results" id="cat-results"></div>
        <div class="tip-box" id="tip-box"></div>
        <div class="btn-container" style="padding-top:14px">
          <div class="primary-btn" id="restart-btn">&#128260; Nuevas preguntas (reiniciar)</div>
        </div>
      </div>
      <p class="creditos">
        Creado por Jos&eacute; M. Fern&aacute;ndez, ABE/ASE Math Master Teacher, Harry S. Truman College &mdash; City Colleges of Chicago.<br>
        Licencia <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a>.
      </p>
    </div>

    <script>
    (function () {
      if (window.quizProdNotIniciado) return;
      window.quizProdNotIniciado = true;

      /* ── UTILS ── */
      function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      const M2 = '\u2212';   /* signo menos */
      const SQ = '\u00b2';   /* al cuadrado */

      /* ── FORMATEADORES DE EXPRESIONES ── */
      function bin(a) { return 'x ' + (a > 0 ? '+' : M2) + ' ' + Math.abs(a); } /* "x + 3" / "x - 3" */
      function fmtBX(b) {
        if (b === 0) return '';
        const s = b > 0 ? ' + ' : ' ' + M2 + ' ';
        const m = Math.abs(b);
        return s + (m === 1 ? '' : m) + 'x';
      }
      function fmtC(c) {
        if (c === 0) return '';
        return (c > 0 ? ' + ' : ' ' + M2 + ' ') + Math.abs(c);
      }
      function tri(b, c) { return 'x' + SQ + fmtBX(b) + fmtC(c); } /* x^2 (+/- bx) (+/- c) */

      /* ── OPCIONES DE TEXTO ──
         Cada generador entrega al menos 3 distractores distintos de la respuesta
         correcta; de lo contrario makeOptsText devolveria menos de 4 opciones. */
      function makeOptsText(ok, dist) {
        const seen = new Set([ok]), uniq = [];
        for (const d of dist) { if (!seen.has(d) && uniq.length < 3) { seen.add(d); uniq.push(d); } }
        const all = shuffle([ok, ...uniq]);
        const L = ['a', 'b', 'c', 'd'];
        return { opciones: all.map((v, i) => ({ valor: L[i], texto: L[i].toUpperCase() + '. ' + v })), correcta: L[all.indexOf(ok)] };
      }

      /* ── caja con la expresion grande ── */
      function cajaExpr(txt) {
        return '<div class="data-box"><span class="expr-grande">' + txt + '</span></div>';
      }

      /* ══════════════════════════════════════ CATEGORIAS ══════════════════════════════════════ */
      const CC = {
        'Cuadrado de una suma':       '#5b21b6',
        'Cuadrado de una diferencia': '#9d174d',
        'Suma por diferencia':        '#0e7490',
        'Producto de dos binomios':   '#166534',
        'T\u00e9rmino que falta':     '#92400e'
      };
      const CI = {
        'Cuadrado de una suma':       '(+)' + SQ,
        'Cuadrado de una diferencia': '(' + M2 + ')' + SQ,
        'Suma por diferencia':        '+ ' + M2,
        'Producto de dos binomios':   '( )( )',
        'T\u00e9rmino que falta':     '?'
      };
      const TIPS = {
        'Cuadrado de una suma':
          'El cuadrado de una suma NO es la suma de los cuadrados. (x + a)' + SQ + ' = x' + SQ + ' + 2ax + a' + SQ + ': no olvides el DOBLE PRODUCTO 2ax. As\u00ed, (x + 3)' + SQ + ' = x' + SQ + ' + 6x + 9, no x' + SQ + ' + 9.',
        'Cuadrado de una diferencia':
          '(x ' + M2 + ' a)' + SQ + ' = x' + SQ + ' ' + M2 + ' 2ax + a' + SQ + '. El t\u00e9rmino del medio es negativo, pero el \u00faltimo (a' + SQ + ') siempre es positivo. (x ' + M2 + ' 4)' + SQ + ' = x' + SQ + ' ' + M2 + ' 8x + 16.',
        'Suma por diferencia':
          'Solo cuando es (x + a)(x ' + M2 + ' a) el resultado es x' + SQ + ' ' + M2 + ' a' + SQ + ' (los t\u00e9rminos del medio se cancelan). No hay t\u00e9rmino en x. (x + 5)(x ' + M2 + ' 5) = x' + SQ + ' ' + M2 + ' 25.',
        'Producto de dos binomios':
          'En (x + a)(x + b) el coeficiente del medio es la SUMA a + b y el \u00faltimo t\u00e9rmino es el PRODUCTO a\u00b7b. (x + 2)(x + 3) = x' + SQ + ' + 5x + 6.',
        'T\u00e9rmino que falta':
          'Recuerda la estructura: x' + SQ + ' + 2ax + a' + SQ + '. El t\u00e9rmino del medio es 2ax (el doble) y el \u00faltimo es a' + SQ + ' (el cuadrado del segundo n\u00famero).'
      };

      /* ══════════════════════════════════════
         GENERADORES — 20 preguntas (4 por categoria)
         ══════════════════════════════════════ */

      /* CAT 1 — Cuadrado de una suma: (x + a)^2 */
      function cuadSuma(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText(tri(2 * a, a * a),
            [tri(0, a * a), tri(a, a * a), tri(2 * a, -a * a)]);
          return { cat: 'Cuadrado de una suma', t: 40,
            q: 'Desarrolla el producto notable:', data: cajaExpr('(' + bin(a) + ')' + SQ),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 2 — Cuadrado de una diferencia: (x - a)^2 */
      function cuadDif(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText(tri(-2 * a, a * a),
            [tri(0, a * a), tri(2 * a, a * a), tri(-a, a * a)]);
          return { cat: 'Cuadrado de una diferencia', t: 42,
            q: 'Desarrolla el producto notable:', data: cajaExpr('(' + bin(-a) + ')' + SQ),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 3 — Suma por diferencia: (x + a)(x - a) */
      function sumDif(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText(tri(0, -a * a),
            [tri(0, a * a), tri(-2 * a, a * a), tri(2 * a, a * a)]);
          return { cat: 'Suma por diferencia', t: 38,
            q: 'Desarrolla el producto notable:', data: cajaExpr('(' + bin(a) + ')(' + bin(-a) + ')'),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 4 — Producto de dos binomios: (x + p)(x + q) */
      function prod2(base) {
        return () => {
          const p = base, q = base + rand(1, 3);
          const o = makeOptsText(tri(p + q, p * q),
            [tri(p * q, p + q), tri(p + q, -p * q), tri(0, p * q)]);
          return { cat: 'Producto de dos binomios', t: 45,
            q: 'Desarrolla el producto:', data: cajaExpr('(' + bin(p) + ')(' + bin(q) + ')'),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 5 — Termino que falta: medio (2ax) */
      function tqfMedio(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText((2 * a) + 'x',
            [a + 'x', (a * a) + 'x', '' + (2 * a)]);
          return { cat: 'T\u00e9rmino que falta', t: 35,
            q: '\u00bfQu\u00e9 t\u00e9rmino ocupa el espacio?',
            data: cajaExpr('(x + ' + a + ')' + SQ + ' = x' + SQ + ' + ____ + ' + (a * a)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 5 — Termino que falta: constante (a^2) */
      function tqfConst(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText('' + (a * a),
            ['' + (2 * a), '' + a, '' + (2 * a * a)]);
          return { cat: 'T\u00e9rmino que falta', t: 35,
            q: '\u00bfQu\u00e9 t\u00e9rmino ocupa el espacio?',
            data: cajaExpr('(x + ' + a + ')' + SQ + ' = x' + SQ + ' + ' + (2 * a) + 'x + ____'),
            opciones: o.opciones, correcta: o.correcta };
        };
      }

      const GEN = [
        cuadSuma(2, 3), cuadSuma(4, 5), cuadSuma(6, 7), cuadSuma(8, 9),
        cuadDif(2, 3), cuadDif(4, 5), cuadDif(6, 7), cuadDif(8, 9),
        sumDif(2, 4), sumDif(5, 6), sumDif(7, 8), sumDif(9, 10),
        prod2(2), prod2(3), prod2(4), prod2(5),
        tqfMedio(3, 4), tqfMedio(5, 6), tqfConst(3, 5), tqfConst(6, 8)
      ];

      /* ── MOTOR ── */
      const preguntas = shuffle(GEN.map(g => g()));
      const total = preguntas.length;
      let actual = 0, puntos = 0, respondida = false, reloj = null, segs = 0;
      const catPts = {}, catTot = {};
      preguntas.forEach(p => {
        catTot[p.cat] = (catTot[p.cat] || 0) + 1;
        catPts[p.cat] = catPts[p.cat] || 0;
      });

      const qArea = document.getElementById('question-area');
      const barP = document.getElementById('progress-bar');
      const txtP = document.getElementById('progress-text');

      function render(i) {
        const p = preguntas[i];
        const col = CC[p.cat] || '#5b21b6';
        const icon = CI[p.cat] || '';
        const tLbl = p.t <= 38 ? '&#9889; R\u00e1pida' : p.t <= 44 ? '&#128336; Media' : '&#9203; Compleja';
        const opHtml = p.opciones.map(o =>
          '<div class="option-item" data-val="' + o.valor + '" onclick="window.__pnClick(this)">' + o.texto + '</div>'
        ).join('');
        const dH = p.data ? p.data : '';
        const btn = i === total - 1 ? 'Ver resultados' : 'Siguiente &rsaquo;';
        qArea.innerHTML =
          '<div class="question-meta">' +
            '<span class="cat-badge" style="background:' + col + '"><span aria-hidden="true">' + icon + '</span> ' + p.cat + '</span>' +
            '<span class="time-badge">' + tLbl + ' &middot; ' + p.t + 's</span>' +
          '</div>' +
          '<div class="question-header">' + p.q + '</div>' +
          dH +
          '<div class="options">' + opHtml + '</div>' +
          '<div class="btn-container"><div class="primary-btn" onclick="window.__pnNext()">' + btn + '</div></div>';
        if (barP) barP.style.width = ((i + 1) / total) * 100 + '%';
        if (txtP) txtP.textContent = 'Pregunta ' + (i + 1) + ' de ' + total;
        iniciarReloj(p.t);
      }

      window.__pnClick = function (el) {
        if (respondida) return;
        pararReloj();
        respondida = true;
        const p = preguntas[actual];
        const elegida = el.getAttribute('data-val');
        if (elegida === p.correcta) {
          el.className = 'option-item correct disabled';
          puntos++;
          catPts[p.cat]++;
        } else {
          el.className = 'option-item incorrect disabled';
          const ok = qArea.querySelector('.option-item[data-val="' + p.correcta + '"]');
          if (ok) ok.className = 'option-item correct disabled';
        }
        qArea.querySelectorAll('.option-item').forEach(o => {
          if (!o.className.includes('disabled')) o.className += ' disabled';
        });
      };

      window.__pnNext = function () {
        pararReloj();
        actual++;
        respondida = false;
        if (actual < total) render(actual);
        else mostrarRes();
      };

      function iniciarReloj(s) {
        pararReloj();
        segs = s;
        updReloj();
        reloj = setInterval(() => { segs--; updReloj(); if (segs <= 0) tAgotado(); }, 1000);
      }
      function pararReloj() { if (reloj) { clearInterval(reloj); reloj = null; } }
      function updReloj() {
        const p = preguntas[actual] || { t: 40 };
        const tt = document.getElementById('timer-text');
        const tb = document.getElementById('timer-bar');
        const tc = document.getElementById('timer-container');
        if (tt) tt.textContent = '\u23F1 Tiempo: ' + segs + 's';
        const pct = (segs / p.t) * 100;
        if (tb) {
          tb.style.width = pct + '%';
          if (pct <= 25) {
            tb.style.background = '#dc3545';
            if (tc) tc.className = 'timer-container timer-warning';
          } else if (pct <= 50) {
            tb.style.background = 'linear-gradient(90deg,#ffc107,#dc3545)';
            if (tc) tc.className = 'timer-container';
          } else {
            tb.style.background = 'linear-gradient(90deg,#28a745,#ffc107,#dc3545)';
            if (tc) tc.className = 'timer-container';
          }
        }
      }
      function tAgotado() {
        pararReloj();
        respondida = true;
        const p = preguntas[actual];
        const ok = qArea.querySelector('.option-item[data-val="' + p.correcta + '"]');
        if (ok) ok.className = 'option-item correct disabled';
        qArea.querySelectorAll('.option-item').forEach(o => {
          if (!o.className.includes('disabled')) o.className += ' disabled';
        });
        const tt = document.getElementById('timer-text');
        if (tt) tt.textContent = '\u23F0 \u00a1Tiempo agotado!';
        const tc = document.getElementById('timer-container');
        if (tc) tc.className = 'timer-container timer-warning';
      }

      function mostrarRes() {
        pararReloj();
        qArea.innerHTML = '';
        document.getElementById('timer-container').style.display = 'none';
        const pct = Math.round((puntos / total) * 100);
        document.getElementById('final-score').textContent = puntos + ' / ' + total + '  (' + pct + '%)';
        let msg = pct >= 85 ? '\u{1F3C6} \u00a1Excelente! Dominas los productos notables; eso te dar\u00e1 soltura al resolver ecuaciones.'
                : pct >= 70 ? '\u{1F44D} \u00a1Muy bien! Repasa las categor\u00edas marcadas en rojo.'
                : pct >= 50 ? '\u{1F4AA} Buen intento. Cuida el DOBLE PRODUCTO (2ax) y el signo del t\u00e9rmino del medio.'
                : '\u{1F4DA} Sigue practicando: memoriza las tres f\u00f3rmulas clave y desarrolla paso a paso.';
        document.getElementById('final-msg').textContent = msg;

        let html = '<h3>Desglose por categor\u00eda</h3>';
        for (const cat of Object.keys(catTot)) {
          const s = catPts[cat] || 0;
          const t2 = catTot[cat];
          const p2 = Math.round((s / t2) * 100);
          const col = CC[cat] || '#5b21b6';
          html +=
            '<div class="cat-row">' +
              '<span class="cat-lbl"><span aria-hidden="true">' + CI[cat] + '</span> ' + cat + '</span>' +
              '<div class="cat-bar-out"><div class="cat-bar-in" style="width:' + p2 + '%;background:' + col + '"></div></div>' +
              '<span class="cat-sc">' + s + '/' + t2 + ' \u2713</span>' +
            '</div>';
        }
        document.getElementById('cat-results').innerHTML = html;
        let minCat = '', minPct = 999;
        for (const cat of Object.keys(catTot)) {
          const pp = (catPts[cat] || 0) / catTot[cat];
          if (pp < minPct) { minPct = pp; minCat = cat; }
        }
        document.getElementById('tip-box').innerHTML = minPct < 1
          ? '<strong>\u{1F4CC} Para mejorar en \u00ab' + minCat + '\u00bb:</strong><br>' + (TIPS[minCat] || '')
          : '\u2705 \u00a1Sin categor\u00edas con cero! Ahora intenta mejorar tus tiempos.';
        document.getElementById('result-screen').className = 'result-screen';
        document.querySelector('.quiz-progress-header').style.display = 'none';
        document.getElementById('restart-btn').onclick = () => window.location.reload();
      }

      render(0);
    })();
    </script>
  </body>
</html>
