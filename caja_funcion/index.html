<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4-U5-L3:INTERACTIVO Evaluador de funciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      width: 100%;
      max-width: 900px;
      min-height: 520px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.1);
    }

    /* ─── PANEL IZQUIERDO ─────────────────────────────── */
    .panel-left {
      background: linear-gradient(160deg, #0f4c75 0%, #1a6fa3 60%, #1282a2 100%);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 900;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title span { font-size: 1.1rem; }

    .step-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .step-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step-badge {
      width: 18px; height: 18px;
      background: #fbbf24;
      color: #0f4c75;
      border-radius: 50%;
      font-size: 0.65rem;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .num-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .num-input::placeholder { color: rgba(255,255,255,0.35); font-weight: 400; }
    .num-input:focus {
      border-color: #fbbf24;
      background: rgba(255,255,255,0.18);
    }
    .num-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-verify {
      padding: 10px 14px;
      width: 100%;
      background: #fbbf24;
      color: #0f4c75;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, opacity 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-verify:hover:not(:disabled) {
      background: #f59e0b;
      transform: translateY(-1px);
    }
    .btn-verify:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .message-box {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.4;
      display: none;
    }
    .message-box.correct {
      background: rgba(16,185,129,0.2);
      border: 1.5px solid rgba(16,185,129,0.5);
      color: #6ee7b7;
    }
    .message-box.incorrect {
      background: rgba(251,191,36,0.15);
      border: 1.5px solid rgba(251,191,36,0.4);
      color: #fde68a;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* Paso 2 hint */
    .hint-text {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      font-weight: 600;
    }
    .hint-text strong { color: rgba(255,255,255,0.85); }

    .btn-new {
      margin-top: auto;
      padding: 12px 20px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative; z-index: 1;
    }
    .btn-new:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    /* ─── PANEL DERECHO ───────────────────────────────── */
    .panel-right {
      background: #ffffff;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .engine-title {
      font-size: 0.7rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* Número objetivo */
    .target-display {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .target-chip {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      border: 2px solid #fca5a5;
      border-radius: 12px;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .target-chip-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: #dc2626;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .target-chip-value {
      font-family: 'Fira Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #b91c1c;
      line-height: 1;
    }
    .target-arrow {
      font-size: 1.4rem;
      color: #cbd5e1;
    }
    .target-caption {
      font-size: 0.82rem;
      color: #64748b;
      font-weight: 600;
      line-height: 1.4;
    }

    /* Caja de función */
    .function-box {
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border: 2.5px solid #fcd34d;
      border-radius: 16px;
      padding: 20px 24px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .function-box::before {
      content: 'f(x)';
      position: absolute;
      top: 8px; right: 12px;
      font-size: 0.65rem;
      font-weight: 800;
      color: #d97706;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }
    .function-text {
      font-family: 'Fira Mono', monospace;
      font-size: 1.45rem;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      transition: opacity 0.25s, transform 0.25s;
      line-height: 1.3;
    }
    .function-text.fade-out { opacity: 0; transform: scale(0.96); }
    .function-text.fade-in  { opacity: 1; transform: scale(1); }

    /* Botones de paso */
    .step-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .btn-step {
      padding: 10px 8px;
      border: 2.5px solid transparent;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }
    .btn-step:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }
    .btn-step:not(:disabled):hover { transform: translateY(-2px); }

    .btn-step .step-icon { font-size: 1.2rem; }
    .btn-step .step-num {
      font-size: 0.62rem;
      opacity: 0.7;
      font-weight: 700;
    }

    .btn-step-1 {
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border-color: #a78bfa;
      color: #6d28d9;
    }
    .btn-step-1.active {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border-color: #7c3aed;
      color: white;
      box-shadow: 0 6px 16px rgba(109,40,217,0.35);
    }

    .btn-step-2 {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-color: #f59e0b;
      color: #92400e;
    }
    .btn-step-2.active {
      background: linear-gradient(135deg, #d97706, #b45309);
      border-color: #d97706;
      color: white;
      box-shadow: 0 6px 16px rgba(217,119,6,0.35);
    }

    .btn-step-3 {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-color: #34d399;
      color: #065f46;
    }
    .btn-step-3.active {
      background: linear-gradient(135deg, #059669, #047857);
      border-color: #059669;
      color: white;
      box-shadow: 0 6px 16px rgba(5,150,105,0.35);
    }

    /* Resultado destacado */
    .result-display {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border: 2.5px solid #6ee7b7;
      border-radius: 16px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .result-display.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .result-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: #047857;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .result-equation {
      font-family: 'Fira Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: #065f46;
    }

    /* Indicador de progreso visual */
    .progress-track {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 4px;
    }
    .prog-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #e2e8f0;
      transition: background 0.3s, transform 0.3s;
      flex-shrink: 0;
    }
    .prog-dot.done { background: #7c3aed; transform: scale(1.2); }
    .prog-line {
      flex: 1;
      height: 3px;
      background: #e2e8f0;
      transition: background 0.3s;
    }
    .prog-line.done { background: #7c3aed; }
  </style>
</head>
<body>

<div class="app">

  <!-- ─── PANEL IZQUIERDO: CONTROL ────────────────── -->
  <div class="panel-left">

    <div class="panel-title">
      <span>⚙️</span> Panel de control
    </div>

    <!-- Paso 1 -->
    <div class="step-block">
      <div class="step-label">
        <div class="step-badge">1</div>
        Observa el número rojo e ingrésalo
      </div>
      <div class="input-row">
        <input type="number" id="userInput" class="num-input" placeholder="Escribe el número…">
        <button id="verifyBtn" class="btn-verify" disabled>Verificar</button>
      </div>
      <div id="messageBox" class="message-box"></div>
    </div>

    <div class="divider"></div>

    <!-- Paso 2 -->
    <div class="step-block">
      <div class="step-label">
        <div class="step-badge">2</div>
        Explora los tres pasos
      </div>
      <div class="hint-text">
        Después de verificar, usa los botones de la derecha:<br>
        <strong>Función original → Sustitución → Resultado</strong>
      </div>
    </div>

    <div class="divider"></div>

    <button id="newExerciseBtn" class="btn-new">
      🔀 Nuevo ejercicio
    </button>

  </div>

  <!-- ─── PANEL DERECHO: MOTOR ─────────────────────── -->
  <div class="panel-right">

    <div class="engine-title">🔬 Motor de evaluación</div>

    <!-- Número objetivo -->
    <div class="target-display">
      <div class="target-chip">
        <div class="target-chip-label">x =</div>
        <div class="target-chip-value" id="targetNumber">—</div>
      </div>
      <div class="target-arrow">→</div>
      <div class="target-caption">
        Ingresa este valor<br>en el panel de control
      </div>
    </div>

    <!-- Caja de función -->
    <div class="function-box">
      <div class="function-text fade-in" id="functionText">h(x) = ?</div>
    </div>

    <!-- Botones de paso -->
    <div class="step-buttons">
      <button class="btn-step btn-step-1 active" id="btnStep1" disabled>
        <span class="step-icon">📐</span>
        Función original
        <span class="step-num">PASO 1</span>
      </button>
      <button class="btn-step btn-step-2" id="btnStep2" disabled>
        <span class="step-icon">🔢</span>
        Sustitución
        <span class="step-num">PASO 2</span>
      </button>
      <button class="btn-step btn-step-3" id="btnStep3" disabled>
        <span class="step-icon">✅</span>
        Resultado
        <span class="step-num">PASO 3</span>
      </button>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-track">
      <div class="prog-dot done" id="pd1"></div>
      <div class="prog-line" id="pl1"></div>
      <div class="prog-dot" id="pd2"></div>
      <div class="prog-line" id="pl2"></div>
      <div class="prog-dot" id="pd3"></div>
    </div>

    <!-- Resultado -->
    <div class="result-display" id="resultDisplay">
      <div class="result-label">🎯 Resultado</div>
      <div class="result-equation" id="resultEquation">h(8) = 320</div>
    </div>

  </div>
</div>

<script>
  // ── Estado ──────────────────────────────────────────────
  let coeffs = { a: 1, b: 0, c: 0 };
  let targetVal = 1;
  let resultVal = 0;
  let verified  = false;
  let currentStep = 1;

  // ── DOM ──────────────────────────────────────────────────
  const targetNumberEl  = document.getElementById('targetNumber');
  const functionTextEl  = document.getElementById('functionText');
  const resultDisplayEl = document.getElementById('resultDisplay');
  const resultEquationEl= document.getElementById('resultEquation');
  const userInput       = document.getElementById('userInput');
  const verifyBtn       = document.getElementById('verifyBtn');
  const messageBox      = document.getElementById('messageBox');
  const newExerciseBtn  = document.getElementById('newExerciseBtn');
  const btnStep1        = document.getElementById('btnStep1');
  const btnStep2        = document.getElementById('btnStep2');
  const btnStep3        = document.getElementById('btnStep3');
  const pd1 = document.getElementById('pd1');
  const pd2 = document.getElementById('pd2');
  const pd3 = document.getElementById('pd3');
  const pl1 = document.getElementById('pl1');
  const pl2 = document.getElementById('pl2');

  // ── Generación ───────────────────────────────────────────
  function generateExercise() {
    const a = Math.floor(Math.random() * 5) + 1;           // 1–5
    const b = Math.floor(Math.random() * 9) - 4;           // −4 a 4
    const c = Math.floor(Math.random() * 9) - 4;           // −4 a 4
    const v = Math.floor(Math.random() * 8) + 1;           // 1–8
    coeffs   = { a, b, c };
    targetVal = v;
    resultVal = a * v * v + b * v + c;
    verified  = false;
    currentStep = 1;

    // Resetear UI
    userInput.value = '';
    userInput.disabled = false;
    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verificar';
    messageBox.style.display = 'none';
    messageBox.className = 'message-box';

    targetNumberEl.textContent = targetVal;

    setFunctionText(formatOriginal());
    resultDisplayEl.classList.remove('show');

    // Botones: sólo paso 1 activo
    [btnStep1, btnStep2, btnStep3].forEach(b => b.disabled = true);
    btnStep1.classList.add('active');
    btnStep2.classList.remove('active');
    btnStep3.classList.remove('active');
    updateProgress(1);
  }

  // ── Formato ──────────────────────────────────────────────
  function formatOriginal() {
    const { a, b, c } = coeffs;
    let f = `h(x) = ${a}x²`;
    if (b > 0)  f += ` + ${b}x`;
    else if (b < 0) f += ` − ${Math.abs(b)}x`;
    if (c > 0)  f += ` + ${c}`;
    else if (c < 0) f += ` − ${Math.abs(c)}`;
    return f;
  }

  function formatSubstitution() {
    const { a, b, c } = coeffs;
    const v = targetVal;
    let f = `h(${v}) = ${a}(${v})²`;
    if (b > 0)  f += ` + ${b}(${v})`;
    else if (b < 0) f += ` − ${Math.abs(b)}(${v})`;
    if (c > 0)  f += ` + ${c}`;
    else if (c < 0) f += ` − ${Math.abs(c)}`;
    return f;
  }

  function formatResult() {
    return `h(${targetVal}) = ${resultVal}`;
  }

  // ── Animación de texto ───────────────────────────────────
  function setFunctionText(text) {
    functionTextEl.classList.remove('fade-in');
    functionTextEl.classList.add('fade-out');
    setTimeout(() => {
      functionTextEl.textContent = text;
      functionTextEl.classList.remove('fade-out');
      functionTextEl.classList.add('fade-in');
    }, 220);
  }

  // ── Progreso ─────────────────────────────────────────────
  function updateProgress(step) {
    pd1.classList.toggle('done', step >= 1);
    pd2.classList.toggle('done', step >= 2);
    pd3.classList.toggle('done', step >= 3);
    pl1.classList.toggle('done', step >= 2);
    pl2.classList.toggle('done', step >= 3);
  }

  // ── Verificar ────────────────────────────────────────────
  function doVerify() {
    const input = parseInt(userInput.value);
    verified = true;

    // Mostrar función original (paso 1 ya activo)
    setFunctionText(formatOriginal());

    // Habilitar botones de paso
    btnStep1.disabled = false;
    btnStep2.disabled = false;
    btnStep3.disabled = false;

    verifyBtn.textContent = '✓ Listo';
    verifyBtn.disabled = true;
    userInput.disabled  = true;

    if (input === targetVal) {
      messageBox.innerHTML = `¡Excelente! Ingresaste <strong>${targetVal}</strong> correctamente. Ahora explora los tres pasos →`;
      messageBox.className = 'message-box correct';
    } else {
      messageBox.innerHTML = `Ingresaste <strong>${input}</strong>, pero el valor es <strong>${targetVal}</strong>. Igual puedes explorar los pasos →`;
      messageBox.className = 'message-box incorrect';
    }
    messageBox.style.display = 'block';

    currentStep = 1;
    updateProgress(1);
  }

  // ── Pasos ────────────────────────────────────────────────
  function activateStep(step) {
    currentStep = step;
    [btnStep1, btnStep2, btnStep3].forEach(b => b.classList.remove('active'));

    if (step === 1) {
      btnStep1.classList.add('active');
      setFunctionText(formatOriginal());
      resultDisplayEl.classList.remove('show');
    } else if (step === 2) {
      btnStep2.classList.add('active');
      setFunctionText(formatSubstitution());
      resultDisplayEl.classList.remove('show');
    } else {
      btnStep3.classList.add('active');
      setFunctionText(formatResult());
      resultEquationEl.textContent = `h(${targetVal}) = ${resultVal}`;
      resultDisplayEl.classList.add('show');
    }
    updateProgress(step);
  }

  // ── Eventos ──────────────────────────────────────────────
  userInput.addEventListener('input', function() {
    verifyBtn.disabled = this.value === '' || verified;
  });

  userInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !verifyBtn.disabled) doVerify();
  });

  verifyBtn.addEventListener('click', doVerify);

  btnStep1.addEventListener('click', () => activateStep(1));
  btnStep2.addEventListener('click', () => activateStep(2));
  btnStep3.addEventListener('click', () => activateStep(3));

  newExerciseBtn.addEventListener('click', generateExercise);

  // ── Inicio ───────────────────────────────────────────────
  generateExercise();
</script>
</body>
</html>
