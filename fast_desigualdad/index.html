<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rapidez en desigualdades — GED</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    :root {
      --cp: #0089cd; --cs: #005f8f; --ch: #00a8fc;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 10px;
      background: linear-gradient(135deg, #0089cd, #002d4d);
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 90vh; flex-direction: column; gap: 10px;
    }
    #quiz-container {
      background: #fff; border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      overflow: hidden; width: clamp(300px, 95%, 820px);
      margin: 0 auto;
    }
    .quiz-progress-header {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      padding: 16px 22px; border-bottom: 3px solid var(--cp);
    }
    .progress-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.95em, 2.5vw, 1.1em);
      color: var(--cp); margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .progress-container {
      background: #e0e0e0; height: 12px; border-radius: 6px;
      overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }
    .progress-bar {
      height: 100%; width: 5%;
      background: linear-gradient(90deg, var(--cp), var(--ch));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 6px;
    }
    .question-meta {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 20px 0; gap: 10px; flex-wrap: wrap;
    }
    .cat-badge {
      padding: 5px 15px; border-radius: 20px;
      font-size: 0.8em; font-weight: 700; color: #fff;
      letter-spacing: 0.4px;
    }
    .time-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.78em; font-weight: 600;
      background: #e8f4f8; color: #444;
      border: 1px solid #ccc;
    }
    .question-header {
      padding: 16px 22px 8px;
      font-size: clamp(1em, 2.6vw, 1.2em);
      font-weight: 700; text-align: center;
      color: #1a1a2e; line-height: 1.55;
    }
    .math-box {
      background: linear-gradient(135deg, #f0f7ff, #e4effc);
      border: 2px solid var(--cp); border-radius: 10px;
      margin: 0 22px 14px; padding: 16px 18px;
      font-size: clamp(1.1em, 2.8vw, 1.4em);
      font-weight: 700; text-align: center;
      color: #003366;
      line-height: 1.5;
      font-family: 'Cambria Math', 'STIX Two Math', Georgia, serif;
      letter-spacing: 0.02em;
    }
    .math-box svg { max-width: 100%; height: auto; display: inline-block; }

    .options { padding: 0 18px; }
    .option-item {
      display: block; padding: 12px 16px; margin-bottom: 11px;
      background: #f0f4f8; color: #333;
      border: 2px solid #e0e0e0; border-radius: 8px;
      cursor: pointer; transition: all 0.25s ease;
      font-size: clamp(0.95em, 2.4vw, 1.08em);
      font-weight: 600; line-height: 1.4; user-select: none;
      font-family: 'Cambria Math', 'STIX Two Math', Georgia, serif;
    }
    .option-item:hover:not(.disabled) {
      background: #dff0ff; border-color: var(--ch);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .option-item.correct  { background: #4caf50!important; color:#fff!important; border-color:#4caf50!important; }
    .option-item.incorrect{ background: #f44336!important; color:#fff!important; border-color:#f44336!important; }
    .option-item.disabled { cursor: not-allowed; opacity: 0.85; }
    .btn-container { padding: 4px 18px 18px; }
    .primary-btn {
      display: block; width: 100%; padding: 13px;
      color: #fff; border: none; border-radius: 8px;
      font-size: 1.05em; font-weight: 700; cursor: pointer;
      transition: all 0.25s ease; text-transform: uppercase;
      letter-spacing: 1px; background: var(--cp);
      text-align: center; user-select: none; box-sizing: border-box;
    }
    .primary-btn:hover {
      background: var(--ch); transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .timer-container {
      background: linear-gradient(135deg, #fff8e1, #ffecb3);
      padding: 11px 18px; border-top: 2px solid #f39c12;
    }
    .timer-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.88em, 2.2vw, 1em);
      color: #c77a00; margin-bottom: 7px;
    }
    .timer-bar-container {
      background: #f0d0d0; height: 8px; border-radius: 4px; overflow: hidden;
    }
    .timer-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg,#28a745,#ffc107,#dc3545);
      transition: width 0.1s linear; border-radius: 4px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
    .timer-warning { animation: pulse 0.9s infinite; }
    .result-screen { padding: 35px 28px; text-align: center; }
    .result-screen.hidden { display: none; }
    .result-screen h2 { color: var(--cp); font-size: clamp(1.4em,4vw,1.9em); margin-bottom: 10px; }
    .result-score {
      font-size: clamp(2em,6vw,2.8em)!important;
      font-weight: 800; color: var(--cp)!important; margin: 12px 0!important;
    }
    .result-msg { font-size: clamp(1em,2.8vw,1.2em); color:#333; margin:8px 0; }
    .cat-results { margin: 18px 0; text-align: left; }
    .cat-results h3 { color: var(--cp); font-size: 0.95em; margin-bottom: 10px; }
    .cat-row { display:flex; align-items:center; gap:8px; margin:7px 0; }
    .cat-lbl { flex:1.3; font-size:0.78em; font-weight:600; }
    .cat-bar-out { flex:2; background:#eee; border-radius:4px; height:10px; }
    .cat-bar-in { height:100%; border-radius:4px; background:var(--cp); transition:width 0.6s; }
    .cat-sc { font-weight:700; color:var(--cp); font-size:0.82em; min-width:38px; text-align:right; }
    .tip-box {
      background:#e8f5e9; border-left:4px solid #43a047;
      border-radius:6px; padding:10px 14px; margin:14px 0 4px;
      font-size:0.82em; color:#2e7d32; text-align:left; line-height:1.5;
    }
  </style>
</head>
<body>
<div id="quiz-container">

  <div class="quiz-progress-header">
    <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div id="question-area"></div>

  <div class="timer-container" id="timer-container">
    <div class="timer-text" id="timer-text">⏱ Tiempo: 60s</div>
    <div class="timer-bar-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
  </div>

  <div class="result-screen hidden" id="result-screen">
    <h2>🎯 ¡Cuestionario completado!</h2>
    <p class="result-score" id="final-score"></p>
    <p class="result-msg" id="final-msg"></p>
    <div class="cat-results" id="cat-results"></div>
    <div class="tip-box" id="tip-box"></div>
    <div class="btn-container" style="padding-top:14px">
      <div class="primary-btn" id="restart-btn">🔄 Nuevas preguntas (reiniciar)</div>
    </div>
  </div>
 <p style="text-align: center">Creado por Prof. José M. Fernández con Claude Opus 4.7</p>
</div>

<script>
(function(){
  if(window.quizDesigualdadesIniciado) return;
  window.quizDesigualdadesIniciado = true;

  /* ─── UTILIDADES ─── */
  const M  = '\u2212';   // signo menos tipográfico
  const LE = '\u2264';   // ≤
  const GE = '\u2265';   // ≥
  const LT = '&lt;';
  const GT = '&gt;';

  function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  // Formatea un número con signo menos tipográfico cuando es negativo
  function num(n){
    if(n<0) return M+Math.abs(n);
    return String(n);
  }

  // Construye una respuesta tipo "x < 5" o "x ≥ −3"
  // sym: 'lt'|'gt'|'le'|'ge'
  function ineq(sym, value){
    let s;
    if(sym==='lt') s=LT;
    else if(sym==='gt') s=GT;
    else if(sym==='le') s=LE;
    else if(sym==='ge') s=GE;
    return 'x '+s+' '+num(value);
  }

  // Voltea el sentido (para distractor que olvida voltear)
  function flip(sym){
    return sym==='lt'?'gt':sym==='gt'?'lt':sym==='le'?'ge':'le';
  }

  // Toggle estricto<->débil (otro distractor común)
  function strict(sym){
    return sym==='lt'?'le':sym==='gt'?'ge':sym==='le'?'lt':'gt';
  }

  /* ─── makeOpts genérico para strings ─── */
  function makeOpts(correct, distractors){
    const cs=String(correct), seen=new Set([cs]), uniq=[];
    for(const d of distractors){
      if(d==null) continue;
      const ds=String(d);
      if(ds==='NaN' || ds.indexOf('NaN')>=0 || ds==='undefined') continue;
      if(!seen.has(ds) && uniq.length<3){ seen.add(ds); uniq.push(ds); }
    }
    let attempts=0;
    while(uniq.length<3 && attempts<30){
      attempts++;
      // distractor genérico: cambia el número
      const m=cs.match(/(.+?)(-?\u2212?\d+)$/);
      let fake;
      if(m){
        const numPart=m[2].replace(M,'-');
        const n=parseInt(numPart);
        const newN=n+(attempts%2===0?attempts:-attempts);
        fake=m[1]+num(newN);
      } else {
        fake='?'+attempts;
      }
      if(fake && !seen.has(fake)){ seen.add(fake); uniq.push(fake); }
    }
    while(uniq.length<3){ uniq.push('?'+uniq.length); }
    const all=shuffle([cs, ...uniq]);
    const L=['a','b','c','d'];
    return {
      opciones: all.map((v,i)=>({valor:L[i], texto:L[i].toUpperCase()+'. '+v})),
      correcta: L[all.indexOf(cs)]
    };
  }

  /* ─── SVG de recta numérica ─── */
  // highlight: número entero donde va el círculo
  // filled: true (lleno = incluye) | false (vacío = no incluye)
  // direction: 'left' | 'right'
  // range: [min, max]
  function numberLine(highlight, filled, direction, range){
    const min=range[0], max=range[1];
    const W=420, H=70;
    const marginX=28;
    const axisY=32;
    const span=max-min;
    const xFor=v=>marginX+((v-min)/span)*(W-2*marginX);
    const hx=xFor(highlight);

    let ticks='';
    for(let v=min; v<=max; v++){
      const x=xFor(v);
      ticks+=`<line x1="${x}" y1="${axisY-4}" x2="${x}" y2="${axisY+4}" stroke="#333" stroke-width="1.4"/>`;
      const lbl=v<0?M+Math.abs(v):String(v);
      ticks+=`<text x="${x}" y="${axisY+18}" text-anchor="middle" font-family="Poppins,Arial" font-size="11" fill="#333">${lbl}</text>`;
    }
    const axis=`<line x1="${marginX-10}" y1="${axisY}" x2="${W-marginX+10}" y2="${axisY}" stroke="#1a1a1a" stroke-width="1.8"/>`;
    const arrowL=`<polygon points="${marginX-12},${axisY} ${marginX-2},${axisY-5} ${marginX-2},${axisY+5}" fill="#1a1a1a"/>`;
    const arrowR=`<polygon points="${W-marginX+12},${axisY} ${W-marginX+2},${axisY-5} ${W-marginX+2},${axisY+5}" fill="#1a1a1a"/>`;

    let shade='';
    if(direction==='right'){
      shade=`<line x1="${hx}" y1="${axisY}" x2="${W-marginX+5}" y2="${axisY}" stroke="#0089cd" stroke-width="4" stroke-linecap="round"/>`;
      shade+=`<polygon points="${W-marginX+12},${axisY} ${W-marginX+2},${axisY-6} ${W-marginX+2},${axisY+6}" fill="#0089cd"/>`;
    } else {
      shade=`<line x1="${marginX-5}" y1="${axisY}" x2="${hx}" y2="${axisY}" stroke="#0089cd" stroke-width="4" stroke-linecap="round"/>`;
      shade+=`<polygon points="${marginX-12},${axisY} ${marginX-2},${axisY-6} ${marginX-2},${axisY+6}" fill="#0089cd"/>`;
    }
    const circle=filled
      ? `<circle cx="${hx}" cy="${axisY}" r="6.5" fill="#0089cd" stroke="#0089cd" stroke-width="2"/>`
      : `<circle cx="${hx}" cy="${axisY}" r="6.5" fill="#ffffff" stroke="#0089cd" stroke-width="2.5"/>`;

    return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recta numérica">${axis}${arrowL}${arrowR}${ticks}${shade}${circle}</svg>`;
  }

  /* ─── CATEGORÍAS ─── */
  const CC={
    'Suma y resta':'#1a6ba0',
    'Mult. y div. (positivo)':'#0e7a60',
    'Volteo de signo':'#a01c1c',
    'Multipasos':'#c0522a',
    'Recta numérica':'#7b2d8b'
  };
  const CI={
    'Suma y resta':'➕',
    'Mult. y div. (positivo)':'✖️',
    'Volteo de signo':'🔄',
    'Multipasos':'🔀',
    'Recta numérica':'📏'
  };
  const TIPS={
    'Suma y resta':'Consejo: para despejar la x, suma o resta el mismo número en ambos lados. El sentido de la desigualdad NO cambia.',
    'Mult. y div. (positivo)':'Consejo: si multiplicas o divides ambos lados por un número POSITIVO, el sentido de la desigualdad NO cambia.',
    'Volteo de signo':'Consejo CLAVE: si multiplicas o divides por un número NEGATIVO, debes VOLTEAR el sentido de la desigualdad. Es el error #1 del GED.',
    'Multipasos':'Consejo: aplica el orden inverso de operaciones — primero suma/resta, después multiplica/divide. Si distribuyes, hazlo primero.',
    'Recta numérica':'Consejo: círculo LLENO ⬤ = el número SÍ se incluye (≤ o ≥). Círculo VACÍO ◯ = NO se incluye (< o >). La flecha indica el sentido.'
  };

  /* ─── GENERADORES (20) ─── */
  const GEN=[

    /* ════ SUMA Y RESTA (4) ════ */

    /* 1 · x + a OP b · 30s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,9);
      const result=rand(2,9);
      const b=a+result;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);          // olvidó nada (signo opuesto)
      const w2=ineq(sym,a+b);                   // sumó en vez de restar
      const w3=ineq(sym,result+rand(1,2));      // error de cálculo
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Suma y resta', t:30,
        q:'Resuelve la desigualdad:',
        math:`x + ${a} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b}`,
        opciones, correcta };
    },

    /* 2 · x − a OP b · 30s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,9);
      const b=rand(1,9);
      const result=b+a;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,b-a);                   // restó en vez de sumar
      const w3=ineq(sym,result+rand(1,2));
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Suma y resta', t:30,
        q:'Resuelve la desigualdad:',
        math:`x ${M} ${a} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b}`,
        opciones, correcta };
    },

    /* 3 · x + a OP b · resultado negativo · 30s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(5,12);
      const result=-rand(2,7);                  // resultado negativo
      const b=a+result;                         // b puede ser pequeño o negativo, mostramos absoluto si <0
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,-result);               // signo equivocado
      const w3=ineq(sym,result-1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      const bStr= b<0 ? M+Math.abs(b) : String(b);
      return{ cat:'Suma y resta', t:30,
        q:'Resuelve la desigualdad:',
        math:`x + ${a} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${bStr}`,
        opciones, correcta };
    },

    /* 4 · Despeje con suma/resta y constantes a ambos lados · 45s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      // Forma: x − a OP b − c  →  x OP (b − c) + a
      const a=rand(2,8);
      const right=rand(3,12);                   // valor del lado derecho ya simplificado
      const c=rand(1,right-1);
      const b=right+c;
      const result=right+a;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,result-2*a);            // sumó al lado equivocado
      const w3=ineq(sym,b-c-a);                 // restó en vez de sumar
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Suma y resta', t:45,
        q:'Resuelve la desigualdad:',
        math:`x ${M} ${a} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b} ${M} ${c}`,
        opciones, correcta };
    },

    /* ════ MULT. Y DIV. POSITIVO (4) ════ */

    /* 5 · ax OP b · resultado entero · 30s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,9);
      const result=rand(2,9);
      const b=a*result;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);          // olvidó algo (signo opuesto)
      const w2=ineq(sym,b);                     // no dividió
      const w3=ineq(sym,b-a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Mult. y div. (positivo)', t:30,
        q:'Resuelve la desigualdad:',
        math:`${a}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b}`,
        opciones, correcta };
    },

    /* 6 · x/a OP b · 30s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,8);
      const b=rand(2,9);
      const result=a*b;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,b);                     // no multiplicó
      const w3=ineq(sym,b/a|0 || b);            // dividió en vez de multiplicar
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Mult. y div. (positivo)', t:30,
        q:'Resuelve la desigualdad:',
        math:`<span style="display:inline-block;text-align:center;vertical-align:middle;"><span style="display:block;border-bottom:2px solid currentColor;padding:0 6px;font-size:0.85em">x</span><span style="display:block;padding:1px 6px 0;font-size:0.85em">${a}</span></span> ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b}`,
        opciones, correcta };
    },

    /* 7 · ax OP b · resultado negativo · 45s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,7);
      const result=-rand(2,6);                  // resultado negativo (de b negativo)
      const b=a*result;                         // b negativo
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,-result);
      const w3=ineq(sym,b);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Mult. y div. (positivo)', t:45,
        q:'Resuelve la desigualdad:',
        math:`${a}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${num(b)}`,
        opciones, correcta };
    },

    /* 8 · x/a OP b · resultado negativo · 45s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,6);
      const b=-rand(2,7);                       // b negativo
      const result=a*b;                         // negativo
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,b);
      const w3=ineq(sym,-result);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Mult. y div. (positivo)', t:45,
        q:'Resuelve la desigualdad:',
        math:`<span style="display:inline-block;text-align:center;vertical-align:middle;"><span style="display:block;border-bottom:2px solid currentColor;padding:0 6px;font-size:0.85em">x</span><span style="display:block;padding:1px 6px 0;font-size:0.85em">${a}</span></span> ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${num(b)}`,
        opciones, correcta };
    },

    /* ════ VOLTEO DE SIGNO (4) ════ */

    /* 9 · −ax OP b · b positivo · 45s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,8);
      const result=-rand(2,7);                  // resultado negativo
      const b=-a*result;                        // b positivo
      const flipped=flip(sym);
      const correct=ineq(flipped,result);
      const w1=ineq(sym,result);                // olvidó voltear (¡el error clave!)
      const w2=ineq(flipped,-result);           // volteó pero olvidó signo
      const w3=ineq(sym,-result);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Volteo de signo', t:45,
        q:'Resuelve la desigualdad (¡cuidado con el signo!):',
        math:`${M}${a}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${b}`,
        opciones, correcta };
    },

    /* 10 · −ax OP b · b negativo · 45s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,7);
      const result=rand(2,7);                   // resultado positivo
      const b=-a*result;                        // b negativo
      const flipped=flip(sym);
      const correct=ineq(flipped,result);
      const w1=ineq(sym,result);                // olvidó voltear
      const w2=ineq(flipped,-result);
      const w3=ineq(sym,-result);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Volteo de signo', t:45,
        q:'Resuelve la desigualdad (¡cuidado con el signo!):',
        math:`${M}${a}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${num(b)}`,
        opciones, correcta };
    },

    /* 11 · −x OP a · 30s · introducción al volteo */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,9);
      const result=-a;
      const flipped=flip(sym);
      const correct=ineq(flipped,result);
      const w1=ineq(sym,result);
      const w2=ineq(flipped,a);
      const w3=ineq(sym,a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Volteo de signo', t:30,
        q:'Resuelve la desigualdad:',
        math:`${M}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${a}`,
        opciones, correcta };
    },

    /* 12 · a − bx OP c · negativo disfrazado · 60s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const b=rand(2,6);
      const result=rand(2,6);
      // a − bx OP c  →  −bx OP c − a  →  x flipped (c − a)/(−b) = (a − c)/b
      // Elegimos a − c = b * result, c puede ser cualquier valor
      const c=rand(M==='\u2212'?-3:1, 8);       // c entre −3 y 8
      const a=c + b*result;                     // garantiza a > c
      const flipped=flip(sym);
      const correct=ineq(flipped,result);
      const w1=ineq(sym,result);                // olvidó voltear
      const w2=ineq(flipped,-result);
      const w3=ineq(sym,(a-c));                 // sin dividir
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Volteo de signo', t:60,
        q:'Resuelve la desigualdad (¡el signo está disfrazado!):',
        math:`${a} ${M} ${b}x ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${num(c)}`,
        opciones, correcta };
    },

    /* ════ MULTIPASOS (4) ════ */

    /* 13 · ax + b OP c · 60s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const a=rand(2,7);
      const b=rand(1,9);
      const result=rand(2,8);
      const c=a*result+b;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,c-b);                   // no dividió
      const w3=ineq(sym,(c+b)/a|0 || result+1); // sumó b en vez de restar
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Multipasos', t:60,
        q:'Resuelve la desigualdad:',
        math:`${a}x + ${b} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${c}`,
        opciones, correcta };
    },

    /* 14 · k(x ± m) OP n con distributiva · 60s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      const k=rand(2,5);
      const m=rand(1,6);
      const result=rand(2,8);
      const sign=rand(0,1)?'+':M;
      // k(x + m) OP n → x OP n/k − m → result = n/k − m → n = k(result + m)
      // k(x − m) OP n → x OP n/k + m → result = n/k + m → n = k(result − m)
      const inner = sign==='+' ? result+m : result-m;
      const n = k*inner;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,result + (sign==='+'?-2*m:2*m));    // signo equivocado de m
      const w3=ineq(sym,n);                                  // no distribuyó ni dividió
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Multipasos', t:60,
        q:'Resuelve la desigualdad:',
        math:`${k}(x ${sign} ${m}) ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${n}`,
        opciones, correcta };
    },

    /* 15 · ax + b OP cx + d · variables a ambos lados · 75s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      // (a−c)x OP d−b  →  result = (d−b)/(a−c)
      const c=rand(1,4);
      const diff=rand(2,5);
      const a=c+diff;                           // a > c, asegura coef positivo
      const result=rand(2,7);
      const b=rand(1,8);
      const d=b+diff*result;
      const correct=ineq(sym,result);
      const w1=ineq(flip(sym),result);
      const w2=ineq(sym,result+1);
      const w3=ineq(sym,d-b);                   // no dividió por la diferencia
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Multipasos', t:75,
        q:'Resuelve la desigualdad:',
        math:`${a}x + ${b} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${c}x + ${d}`,
        opciones, correcta };
    },

    /* 16 · ax + b OP cx + d · coef. mayor a la derecha (volteo implícito) · 75s */
    ()=>{
      const sym=['lt','gt','le','ge'][rand(0,3)];
      // ax + b OP cx + d con a < c  →  (a−c)x OP d−b → x flipped (d−b)/(a−c)
      // Trabajamos con (c−a)x flipped (b−d), cuidando que el sentido se voltee
      const a=rand(1,3);
      const diff=rand(2,4);
      const c=a+diff;                           // c > a → coef. negativo al pasar
      const result=rand(2,6);
      const d=rand(1,7);
      const b=d+diff*result;                    // así b−d = diff*result, x = (b−d)/(c−a) = result
      const flipped=flip(sym);
      const correct=ineq(flipped,result);
      const w1=ineq(sym,result);                // olvidó voltear
      const w2=ineq(flipped,result+1);
      const w3=ineq(sym,result-1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Multipasos', t:75,
        q:'Resuelve (¡fíjate cuál coeficiente es mayor!):',
        math:`${a}x + ${b} ${sym==='lt'?LT:sym==='gt'?GT:sym==='le'?LE:GE} ${c}x + ${d}`,
        opciones, correcta };
    },

    /* ════ RECTA NUMÉRICA (4) ════ */

    /* 17 · Identificar x > a (círculo vacío, derecha) · 30s */
    ()=>{
      const a=rand(-3,5);
      const minR=Math.min(a-3,-3), maxR=Math.max(a+3,5);
      const svg=numberLine(a, false, 'right', [minR, maxR]);
      const correct='x '+GT+' '+num(a);
      const w1='x '+LT+' '+num(a);              // dirección equivocada
      const w2='x '+GE+' '+num(a);              // confundió tipo de círculo
      const w3='x '+LE+' '+num(a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Recta numérica', t:30,
        q:'¿Qué desigualdad representa esta recta numérica?',
        math:svg,
        opciones, correcta };
    },

    /* 18 · Identificar x ≤ a (círculo lleno, izquierda) · 30s */
    ()=>{
      const a=rand(-2,5);
      const minR=Math.min(a-3,-3), maxR=Math.max(a+3,5);
      const svg=numberLine(a, true, 'left', [minR, maxR]);
      const correct='x '+LE+' '+num(a);
      const w1='x '+GE+' '+num(a);
      const w2='x '+LT+' '+num(a);
      const w3='x '+GT+' '+num(a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Recta numérica', t:30,
        q:'¿Qué desigualdad representa esta recta numérica?',
        math:svg,
        opciones, correcta };
    },

    /* 19 · Identificar con valor negativo · 45s */
    ()=>{
      const a=-rand(1,4);
      const minR=a-3, maxR=Math.max(a+5,4);
      const filled=rand(0,1)===1;
      const dir=rand(0,1)===1?'right':'left';
      const svg=numberLine(a, filled, dir, [minR, maxR]);
      // Determinar respuesta correcta:
      let symStr;
      if(dir==='right') symStr = filled ? GE : GT;
      else              symStr = filled ? LE : LT;
      const correct='x '+symStr+' '+num(a);
      const w1='x '+(dir==='right'?(filled?GT:GE):(filled?LT:LE))+' '+num(a);  // mismo lado, círculo equivocado
      const w2='x '+(dir==='right'?(filled?LE:LT):(filled?GE:GT))+' '+num(a);  // dirección y círculo equivocados
      const w3='x '+symStr+' '+num(-a);                                         // signo del número equivocado
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Recta numérica', t:45,
        q:'¿Qué desigualdad representa esta recta numérica?',
        math:svg,
        opciones, correcta };
    },

    /* 20 · Identificar x ≥ a (círculo lleno, derecha) · 30s */
    ()=>{
      const a=rand(-2,5);
      const minR=Math.min(a-3,-3), maxR=Math.max(a+3,5);
      const svg=numberLine(a, true, 'right', [minR, maxR]);
      const correct='x '+GE+' '+num(a);
      const w1='x '+GT+' '+num(a);              // confundió tipo de círculo
      const w2='x '+LE+' '+num(a);              // dirección equivocada
      const w3='x '+LT+' '+num(a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Recta numérica', t:30,
        q:'¿Qué desigualdad representa esta recta numérica?',
        math:svg,
        opciones, correcta };
    }

  ]; // fin GEN

  /* ─── GENERAR Y MEZCLAR PREGUNTAS ─── */
  const preguntas=shuffle(GEN.map(g=>g()));
  const total=preguntas.length;
  let actual=0, puntos=0, respondida=false, reloj=null, segs=0;
  const catPts={}, catTot={};
  preguntas.forEach(p=>{ catTot[p.cat]=(catTot[p.cat]||0)+1; catPts[p.cat]=catPts[p.cat]||0; });

  const qArea=document.getElementById('question-area');
  const barP=document.getElementById('progress-bar');
  const txtP=document.getElementById('progress-text');

  /* ─── RENDERIZAR PREGUNTA ─── */
  function render(i){
    const p=preguntas[i];
    const col=CC[p.cat]||'#0089cd';
    const icon=CI[p.cat]||'📝';
    const tLabel= p.t<=45?'⚡ Rápida': p.t<=75?'🕐 Media':'⏳ Difícil';
    const opHtml=p.opciones.map(o=>
      `<div class="option-item" data-val="${o.valor}" onclick="window.__qClick(this)">${o.texto}</div>`
    ).join('');
    const mathBlock=p.math?`<div class="math-box">${p.math}</div>`:'';
    const btnLbl=i===total-1?'Ver resultados':'Siguiente ›';
    qArea.innerHTML=`
      <div class="question-meta">
        <span class="cat-badge" style="background:${col}">${icon} ${p.cat}</span>
        <span class="time-badge">${tLabel} · ${p.t}s</span>
      </div>
      <div class="question-header">${p.q}</div>
      ${mathBlock}
      <div class="options">${opHtml}</div>
      <div class="btn-container">
        <div class="primary-btn" onclick="window.__qNext()">${btnLbl}</div>
      </div>`;
    if(barP) barP.style.width=((i+1)/total*100)+'%';
    if(txtP) txtP.textContent=`Pregunta ${i+1} de ${total}`;
    iniciarReloj(p.t);
  }

  /* ─── CLICK OPCIÓN ─── */
  window.__qClick=function(el){
    if(respondida) return;
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const elegida=el.getAttribute('data-val');
    if(elegida===p.correcta){
      el.className='option-item correct disabled';
      puntos++; catPts[p.cat]++;
    } else {
      el.className='option-item incorrect disabled';
      const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
      if(ok) ok.className='option-item correct disabled';
    }
    qArea.querySelectorAll('.option-item').forEach(o=>{
      if(!o.className.includes('disabled')) o.className+=' disabled';
    });
  };

  /* ─── SIGUIENTE ─── */
  window.__qNext=function(){
    pararReloj(); actual++; respondida=false;
    if(actual<total) render(actual);
    else mostrarResultados();
  };

  /* ─── TEMPORIZADOR ─── */
  function iniciarReloj(s){
    pararReloj(); segs=s; actualizarReloj();
    reloj=setInterval(()=>{ segs--; actualizarReloj(); if(segs<=0) tiempoAgotado(); },1000);
  }
  function pararReloj(){ if(reloj){clearInterval(reloj);reloj=null;} }
  function actualizarReloj(){
    const p=preguntas[actual]||{t:60};
    const tt=document.getElementById('timer-text');
    const tb=document.getElementById('timer-bar');
    const tc=document.getElementById('timer-container');
    if(tt) tt.textContent=`⏱ Tiempo: ${segs}s`;
    const pct=(segs/p.t)*100;
    if(tb){
      tb.style.width=pct+'%';
      if(pct<=25){ tb.style.background='#dc3545'; if(tc) tc.className='timer-container timer-warning'; }
      else if(pct<=50){ tb.style.background='linear-gradient(90deg,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
      else{ tb.style.background='linear-gradient(90deg,#28a745,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
    }
  }
  function tiempoAgotado(){
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
    if(ok) ok.className='option-item correct disabled';
    qArea.querySelectorAll('.option-item').forEach(o=>{ if(!o.className.includes('disabled')) o.className+=' disabled'; });
    const tt=document.getElementById('timer-text');
    if(tt) tt.textContent='⏰ ¡Tiempo agotado!';
    const tc=document.getElementById('timer-container');
    if(tc) tc.className='timer-container timer-warning';
  }

  /* ─── RESULTADOS ─── */
  function mostrarResultados(){
    pararReloj();
    qArea.innerHTML='';
    document.getElementById('timer-container').style.display='none';
    const pct=Math.round(puntos/total*100);
    document.getElementById('final-score').textContent=`${puntos} / ${total}  (${pct}%)`;
    let msg='', emoji='';
    if(pct>=85){ emoji='🏆'; msg='¡Excelente! Dominas las desigualdades del GED. ¡Estás listo!'; }
    else if(pct>=70){ emoji='👍'; msg='¡Muy bien! Un poco más de práctica y lo logras.'; }
    else if(pct>=50){ emoji='💪'; msg='Buen intento. Repasa las categorías en rojo y vuelve a intentarlo.'; }
    else { emoji='📚'; msg='Sigue practicando. Identifica las categorías débiles y trabaja en ellas primero.'; }
    document.getElementById('final-msg').textContent=emoji+' '+msg;

    let html='<h3>Resultados por categoría:</h3>';
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat];
      const p2=Math.round(s/t2*100);
      const col=CC[cat]||'#0089cd';
      const barCol=p2>=70?col:'#e53935';
      html+=`<div class="cat-row">
        <span class="cat-lbl">${CI[cat]} ${cat}</span>
        <div class="cat-bar-out"><div class="cat-bar-in" style="width:${p2}%;background:${barCol}"></div></div>
        <span class="cat-sc">${s}/${t2}</span>
      </div>`;
    }
    document.getElementById('cat-results').innerHTML=html;

    let minCat='', minPct=999;
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat], pp=s/t2;
      if(pp<minPct){ minPct=pp; minCat=cat; }
    }
    document.getElementById('tip-box').textContent=
      minPct<1 ? (TIPS[minCat]||'') : '✅ ¡Sin categorías con puntuación 0! Sigue practicando para mejorar los tiempos.';

    document.getElementById('result-screen').className='result-screen';
    document.querySelector('.quiz-progress-header').style.display='none';
    document.getElementById('restart-btn').onclick=()=>window.location.reload();
  }

  /* ─── ARRANQUE ─── */
  render(0);

})();
</script>
</body>
</html>
