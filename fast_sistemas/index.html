<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rapidez en sistemas de ecuaciones — GED</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    :root {
      --cp: #0089cd; --cs: #005f8f; --ch: #00a8fc;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 10px;
      background: linear-gradient(135deg, #0089cd, #002d4d);
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 90vh; flex-direction: column; gap: 10px;
    }
    #quiz-container {
      background: #fff; border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      overflow: hidden; width: clamp(300px, 95%, 820px);
      margin: 0 auto;
    }
    .quiz-progress-header {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      padding: 16px 22px; border-bottom: 3px solid var(--cp);
    }
    .progress-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.95em, 2.5vw, 1.1em);
      color: var(--cp); margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .progress-container {
      background: #e0e0e0; height: 12px; border-radius: 6px;
      overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }
    .progress-bar {
      height: 100%; width: 5%;
      background: linear-gradient(90deg, var(--cp), var(--ch));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 6px;
    }
    .question-meta {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 20px 0; gap: 10px; flex-wrap: wrap;
    }
    .cat-badge {
      padding: 5px 15px; border-radius: 20px;
      font-size: 0.8em; font-weight: 700; color: #fff;
      letter-spacing: 0.4px;
    }
    .time-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.78em; font-weight: 600;
      background: #e8f4f8; color: #444;
      border: 1px solid #ccc;
    }
    .question-header {
      padding: 16px 22px 8px;
      font-size: clamp(1em, 2.6vw, 1.2em);
      font-weight: 700; text-align: center;
      color: #1a1a2e; line-height: 1.55;
    }
    .math-box {
      background: linear-gradient(135deg, #f0f7ff, #e4effc);
      border: 2px solid var(--cp); border-radius: 10px;
      margin: 0 22px 14px; padding: 16px 18px;
      font-size: clamp(1.05em, 2.6vw, 1.3em);
      font-weight: 700; text-align: center;
      color: #003366;
      line-height: 1.7;
      font-family: 'Cambria Math', 'STIX Two Math', Georgia, serif;
      letter-spacing: 0.02em;
    }
    .math-box .system-line { display: block; margin: 4px 0; }

    .options { padding: 0 18px; }
    .option-item {
      display: block; padding: 12px 16px; margin-bottom: 11px;
      background: #f0f4f8; color: #333;
      border: 2px solid #e0e0e0; border-radius: 8px;
      cursor: pointer; transition: all 0.25s ease;
      font-size: clamp(0.95em, 2.4vw, 1.08em);
      font-weight: 600; line-height: 1.4; user-select: none;
      font-family: 'Cambria Math', 'STIX Two Math', Georgia, serif;
    }
    .option-item:hover:not(.disabled) {
      background: #dff0ff; border-color: var(--ch);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .option-item.correct  { background: #4caf50!important; color:#fff!important; border-color:#4caf50!important; }
    .option-item.incorrect{ background: #f44336!important; color:#fff!important; border-color:#f44336!important; }
    .option-item.disabled { cursor: not-allowed; opacity: 0.85; }
    .btn-container { padding: 4px 18px 18px; }
    .primary-btn {
      display: block; width: 100%; padding: 13px;
      color: #fff; border: none; border-radius: 8px;
      font-size: 1.05em; font-weight: 700; cursor: pointer;
      transition: all 0.25s ease; text-transform: uppercase;
      letter-spacing: 1px; background: var(--cp);
      text-align: center; user-select: none; box-sizing: border-box;
    }
    .primary-btn:hover {
      background: var(--ch); transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .timer-container {
      background: linear-gradient(135deg, #fff8e1, #ffecb3);
      padding: 11px 18px; border-top: 2px solid #f39c12;
    }
    .timer-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.88em, 2.2vw, 1em);
      color: #c77a00; margin-bottom: 7px;
    }
    .timer-bar-container {
      background: #f0d0d0; height: 8px; border-radius: 4px; overflow: hidden;
    }
    .timer-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg,#28a745,#ffc107,#dc3545);
      transition: width 0.1s linear; border-radius: 4px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
    .timer-warning { animation: pulse 0.9s infinite; }
    .result-screen { padding: 35px 28px; text-align: center; }
    .result-screen.hidden { display: none; }
    .result-screen h2 { color: var(--cp); font-size: clamp(1.4em,4vw,1.9em); margin-bottom: 10px; }
    .result-score {
      font-size: clamp(2em,6vw,2.8em)!important;
      font-weight: 800; color: var(--cp)!important; margin: 12px 0!important;
    }
    .result-msg { font-size: clamp(1em,2.8vw,1.2em); color:#333; margin:8px 0; }
    .cat-results { margin: 18px 0; text-align: left; }
    .cat-results h3 { color: var(--cp); font-size: 0.95em; margin-bottom: 10px; }
    .cat-row { display:flex; align-items:center; gap:8px; margin:7px 0; }
    .cat-lbl { flex:1.3; font-size:0.78em; font-weight:600; }
    .cat-bar-out { flex:2; background:#eee; border-radius:4px; height:10px; }
    .cat-bar-in { height:100%; border-radius:4px; background:var(--cp); transition:width 0.6s; }
    .cat-sc { font-weight:700; color:var(--cp); font-size:0.82em; min-width:38px; text-align:right; }
    .tip-box {
      background:#e8f5e9; border-left:4px solid #43a047;
      border-radius:6px; padding:10px 14px; margin:14px 0 4px;
      font-size:0.82em; color:#2e7d32; text-align:left; line-height:1.5;
    }
  </style>
</head>
<body>
<div id="quiz-container">

  <div class="quiz-progress-header">
    <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div id="question-area"></div>

  <div class="timer-container" id="timer-container">
    <div class="timer-text" id="timer-text">⏱ Tiempo: 60s</div>
    <div class="timer-bar-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
  </div>

  <div class="result-screen hidden" id="result-screen">
    <h2>🎯 ¡Cuestionario completado!</h2>
    <p class="result-score" id="final-score"></p>
    <p class="result-msg" id="final-msg"></p>
    <div class="cat-results" id="cat-results"></div>
    <div class="tip-box" id="tip-box"></div>
    <div class="btn-container" style="padding-top:14px">
      <div class="primary-btn" id="restart-btn">🔄 Nuevas preguntas (reiniciar)</div>
    </div>
  </div>
 <p style="text-align: center">Creado por Prof. José M. Fernández con Claude Opus 4.7</p>
</div>

<script>
(function(){
  if(window.quizSistemasIniciado) return;
  window.quizSistemasIniciado = true;

  /* ─── UTILIDADES ─── */
  const M = '\u2212'; // signo menos tipográfico

  function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function randNonZero(a,b){
    let v;
    do { v=rand(a,b); } while(v===0);
    return v;
  }
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  // Formatea número con menos tipográfico
  function num(n){ return n<0 ? M+Math.abs(n) : String(n); }

  // Formatea coeficiente al inicio de un término: "2x", "x", "−x", "−2x"
  function coefStart(a, v){
    if(a===1) return v;
    if(a===-1) return M+v;
    if(a<0) return M+Math.abs(a)+v;
    return a+v;
  }

  // Formatea término con signo: "+ 2x", "− 3y" (usado para términos no iniciales)
  function termSigned(a, v){
    if(a===0) return '';
    if(a>0){
      if(a===1) return ' + '+v;
      return ' + '+a+v;
    } else {
      if(a===-1) return ' '+M+' '+v;
      return ' '+M+' '+Math.abs(a)+v;
    }
  }

  // Formatea ecuación ax + by = c
  function eqStr(a, b, c){
    return coefStart(a,'x') + termSigned(b,'y') + ' = ' + num(c);
  }

  // Sistema de dos ecuaciones (HTML para math-box)
  function systemHTML(a1,b1,c1,a2,b2,c2){
    return `<span class="system-line">${eqStr(a1,b1,c1)}</span><span class="system-line">${eqStr(a2,b2,c2)}</span>`;
  }

  // Sistema con eq1 ya despejada: y = ax + b
  function systemSubstHTML(a,b,c2,d2,e2){
    let yEq = 'y = '+coefStart(a,'x');
    if(b>0) yEq += ' + '+b;
    else if(b<0) yEq += ' '+M+' '+Math.abs(b);
    return `<span class="system-line">${yEq}</span><span class="system-line">${eqStr(c2,d2,e2)}</span>`;
  }

  // Par ordenado (x, y)
  function pair(x,y){ return '('+num(x)+', '+num(y)+')'; }

  /* ─── makeOpts genérico para strings ─── */
  function makeOpts(correct, distractors){
    const cs=String(correct), seen=new Set([cs]), uniq=[];
    for(const d of distractors){
      if(d==null) continue;
      const ds=String(d);
      if(ds==='NaN' || ds.indexOf('NaN')>=0 || ds==='undefined') continue;
      if(!seen.has(ds) && uniq.length<3){ seen.add(ds); uniq.push(ds); }
    }
    let attempts=0;
    while(uniq.length<3 && attempts<30){
      attempts++;
      // Para pares ordenados, modifica un valor
      const m=cs.match(/^\(([^,]+),\s*([^)]+)\)$/);
      let fake;
      if(m){
        const x=parseInt(m[1].replace(M,'-'));
        const y=parseInt(m[2].replace(M,'-'));
        fake=pair(x+attempts, y);
      } else {
        fake='?'+attempts;
      }
      if(fake && !seen.has(fake)){ seen.add(fake); uniq.push(fake); }
    }
    while(uniq.length<3){ uniq.push('?'+uniq.length); }
    const all=shuffle([cs, ...uniq]);
    const L=['a','b','c','d'];
    return {
      opciones: all.map((v,i)=>({valor:L[i], texto:L[i].toUpperCase()+'. '+v})),
      correcta: L[all.indexOf(cs)]
    };
  }

  /* ─── CATEGORÍAS ─── */
  const CC={
    'Sustitución':'#1a6ba0',
    'Eliminación directa':'#0e7a60',
    'Eliminación con multiplicación':'#c0522a',
    'Tipo de solución':'#a01c1c',
    'Verificar solución':'#7b2d8b'
  };
  const CI={
    'Sustitución':'🔄',
    'Eliminación directa':'➕',
    'Eliminación con multiplicación':'✖️',
    'Tipo de solución':'🎯',
    'Verificar solución':'📊'
  };
  const TIPS={
    'Sustitución':'Consejo: cuando una ecuación tiene "y =" o "x =", sustituye esa expresión en la otra ecuación. Resuelve para una variable y luego encuentra la otra.',
    'Eliminación directa':'Consejo: si los coeficientes de una variable son OPUESTOS, suma las ecuaciones. Si son IGUALES, resta.',
    'Eliminación con multiplicación':'Consejo: multiplica una o ambas ecuaciones por un número para igualar (u opuestar) los coeficientes de una variable, luego elimina.',
    'Tipo de solución':'Consejo: ÚNICA = pendientes diferentes. NINGUNA = mismas pendientes, intercepto diferente (paralelas). INFINITAS = misma recta (una es múltiplo de la otra).',
    'Verificar solución':'Consejo: sustituye el par (x, y) en AMBAS ecuaciones. Si las dos se cumplen, es solución. Si una falla, NO es solución.'
  };

  /* ─── GENERADORES (20) ─── */
  const GEN=[

    /* ════ SUSTITUCIÓN (4) ════ */

    /* 1 · Eq1 ya despejada: y = ax + b · 60s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,6);
      const a=rand(1,3);
      const b=y-a*x;                            // garantiza que (x,y) cumple eq1
      const c=randNonZero(1,3);
      const d=randNonZero(1,3);
      const e=c*x+d*y;
      const correct=pair(x,y);
      const w1=pair(y,x);                       // intercambio común
      const w2=pair(x+1,y-a);                   // valores cercanos
      const w3=pair(x-1,y+a);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Sustitución', t:60,
        q:'Resuelve el sistema (sustitución):',
        math:systemSubstHTML(a,b,c,d,e),
        opciones, correcta };
    },

    /* 2 · Eq1 ya despejada con pendiente negativa: y = −ax + b · 60s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,6);
      const a=-rand(1,3);                       // pendiente negativa
      const b=y-a*x;
      const c=randNonZero(1,3);
      const d=randNonZero(1,3);
      const e=c*x+d*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(-x,y);
      const w3=pair(x,-y);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Sustitución', t:60,
        q:'Resuelve el sistema (sustitución):',
        math:systemSubstHTML(a,b,c,d,e),
        opciones, correcta };
    },

    /* 3 · Sistema con coef 1 en eq1, despejar y sustituir · 75s */
    ()=>{
      // Eq1: x + by = c1 (coef de x es 1, fácil despejar)
      // Eq2: a2·x + b2·y = c2
      const x=rand(1,5);
      const y=rand(1,5);
      const b1=randNonZero(-3,3);
      const c1=x+b1*y;
      const a2=rand(2,4);
      const b2=randNonZero(-3,3);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y+1);
      const w3=pair(x-1,y-1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Sustitución', t:75,
        q:'Resuelve el sistema (despeja x y sustituye):',
        math:systemHTML(1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 4 · Sistema con coef 1 en y, despejar · 75s */
    ()=>{
      // Eq1: a·x + y = c1 (despejar y)
      // Eq2: a2·x + b2·y = c2
      const x=rand(1,5);
      const y=rand(-3,5);
      const a1=randNonZero(-3,3);
      const c1=a1*x+y;
      const a2=randNonZero(2,4);
      const b2=randNonZero(-3,3);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y);
      const w3=pair(x,y+1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Sustitución', t:75,
        q:'Resuelve el sistema (despeja y y sustituye):',
        math:systemHTML(a1,1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* ════ ELIMINACIÓN DIRECTA (4) ════ */

    /* 5 · Coef de y opuestos: by y −by · 60s · suma */
    ()=>{
      const x=rand(1,6);
      const y=rand(1,6);
      const a1=randNonZero(-4,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=randNonZero(-4,4);
      const b2=-b1;                             // opuesto
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x,-y);
      const w3=pair(-x,y);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación directa', t:60,
        q:'Resuelve sumando las ecuaciones:',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 6 · Coef de x opuestos · 60s · suma */
    ()=>{
      const x=rand(1,6);
      const y=rand(1,6);
      const a1=randNonZero(2,4);
      const b1=randNonZero(-4,4);
      const c1=a1*x+b1*y;
      const a2=-a1;                             // opuesto
      const b2=randNonZero(-4,4);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(-x,y);
      const w3=pair(x,-y);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación directa', t:60,
        q:'Resuelve sumando las ecuaciones:',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 7 · Coef de y iguales · 60s · resta */
    ()=>{
      const x=rand(1,6);
      const y=rand(1,6);
      const a1=randNonZero(2,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=randNonZero(2,4);
      // Asegurar a1 ≠ a2 para que tras restar quede una eq lineal en x
      let a2Fix=a2;
      while(a2Fix===a1) a2Fix=randNonZero(2,4);
      const b2=b1;                              // igual
      const c2=a2Fix*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y-1);
      const w3=pair(x-1,y+1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación directa', t:60,
        q:'Resuelve restando las ecuaciones:',
        math:systemHTML(a1,b1,c1,a2Fix,b2,c2),
        opciones, correcta };
    },

    /* 8 · Coef de x iguales · 60s · resta */
    ()=>{
      const x=rand(1,6);
      const y=rand(1,6);
      const a1=randNonZero(2,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=a1;                              // igual
      let b2=randNonZero(1,4);
      while(b2===b1) b2=randNonZero(1,4);       // garantiza b1≠b2
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y);
      const w3=pair(x,y+1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación directa', t:60,
        q:'Resuelve restando las ecuaciones:',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* ════ ELIMINACIÓN CON MULTIPLICACIÓN (4) ════ */

    /* 9 · Multiplicar eq1 por k para igualar coef de y · 90s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,5);
      const a1=randNonZero(2,4);
      const b1=randNonZero(1,3);
      const c1=a1*x+b1*y;
      const k=rand(2,3);                        // factor de multiplicación
      const a2=randNonZero(2,4);
      const b2=k*b1;                            // múltiplo
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y);
      const w3=pair(x,y+1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación con multiplicación', t:90,
        q:'Resuelve (multiplica una ecuación primero):',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 10 · Multiplicar eq2 por k para igualar coef de x · 90s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,5);
      const a1=randNonZero(2,4);
      const b1=randNonZero(1,3);
      const c1=a1*x+b1*y;
      const k=rand(2,3);
      const a2=k*a1;                            // múltiplo
      const b2=randNonZero(1,3);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x-1,y+1);
      const w3=pair(x+1,y-1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación con multiplicación', t:90,
        q:'Resuelve (multiplica una ecuación primero):',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 11 · Multiplicar para opuestar coef · 90s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,5);
      const a1=randNonZero(2,4);
      const b1=rand(1,3);                       // positivo
      const c1=a1*x+b1*y;
      const k=rand(2,3);
      const a2=randNonZero(2,4);
      const b2=-k*b1;                           // opuesto múltiplo
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(-x,y);
      const w3=pair(x,-y);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación con multiplicación', t:90,
        q:'Resuelve (multiplica para hacer coeficientes opuestos):',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 12 · Multiplicar AMBAS para igualar coef · 90s */
    ()=>{
      const x=rand(1,4);
      const y=rand(1,4);
      // Coeficientes coprimos: usar k1*a y k2*a tal que coprimos
      const a1=2;                               // queda coprimo con 3
      const b1=randNonZero(1,3);
      const c1=a1*x+b1*y;
      const a2=3;
      const b2=randNonZero(1,3);
      const c2=a2*x+b2*y;
      // Para eliminar x: multiplicar eq1 por 3 y eq2 por 2
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y);
      const w3=pair(x,y+1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Eliminación con multiplicación', t:90,
        q:'Resuelve (multiplica AMBAS ecuaciones):',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* ════ TIPO DE SOLUCIÓN (4) ════ */

    /* 13 · Solución única · 45s */
    ()=>{
      // Pendientes diferentes
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=randNonZero(1,15);
      const a2=randNonZero(1,4);
      let b2=randNonZero(1,4);
      // Asegurar a1/b1 ≠ a2/b2 (evita paralelas/coincidentes)
      while(a1*b2===a2*b1){ b2=randNonZero(1,4); }
      const c2=randNonZero(1,15);
      const correct='Solución única';
      const ds=['Sin solución','Infinitas soluciones','No tiene incógnitas'];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Tipo de solución', t:45,
        q:'¿Qué tipo de solución tiene este sistema?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 14 · Sin solución (paralelas) · 60s */
    ()=>{
      // Misma pendiente, diferente intercepto: eq2 = k·eq1 en a,b pero c distinto
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=randNonZero(1,12);
      const k=rand(2,3);
      const a2=k*a1;
      const b2=k*b1;
      let c2=randNonZero(1,20);
      while(c2===k*c1){ c2=randNonZero(1,20); } // garantiza no coincidente
      const correct='Sin solución';
      const ds=['Solución única','Infinitas soluciones','(0, 0)'];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Tipo de solución', t:60,
        q:'¿Qué tipo de solución tiene este sistema?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 15 · Infinitas soluciones (coincidentes) · 60s */
    ()=>{
      // Eq2 = k·Eq1 completamente
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=randNonZero(1,10);
      const k=rand(2,3);
      const a2=k*a1;
      const b2=k*b1;
      const c2=k*c1;
      const correct='Infinitas soluciones';
      const ds=['Solución única','Sin solución','(1, 1)'];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Tipo de solución', t:60,
        q:'¿Qué tipo de solución tiene este sistema?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 16 · Identificar tipo entre los tres · 75s */
    ()=>{
      const tipo=rand(1,3);                     // 1=única, 2=sin, 3=infinitas
      let a1,b1,c1,a2,b2,c2,correct;
      if(tipo===1){
        a1=randNonZero(1,3); b1=randNonZero(1,3); c1=randNonZero(1,12);
        a2=randNonZero(1,3); b2=randNonZero(1,3);
        while(a1*b2===a2*b1){ b2=randNonZero(1,3); }
        c2=randNonZero(1,12);
        correct='Solución única';
      } else if(tipo===2){
        a1=randNonZero(1,3); b1=randNonZero(1,3); c1=randNonZero(1,8);
        const k=2;
        a2=k*a1; b2=k*b1;
        c2=randNonZero(1,15);
        while(c2===k*c1) c2=randNonZero(1,15);
        correct='Sin solución';
      } else {
        a1=randNonZero(1,3); b1=randNonZero(1,3); c1=randNonZero(1,8);
        const k=2;
        a2=k*a1; b2=k*b1; c2=k*c1;
        correct='Infinitas soluciones';
      }
      const ds=['Solución única','Sin solución','Infinitas soluciones'].filter(x=>x!==correct);
      const {opciones,correcta}=makeOpts(correct,ds.concat(['Indeterminado']));
      return{ cat:'Tipo de solución', t:75,
        q:'¿Qué tipo de solución tiene este sistema?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* ════ VERIFICAR SOLUCIÓN (4) ════ */

    /* 17 · ¿Es (x,y) solución? Sí · 45s */
    ()=>{
      const x=rand(1,6);
      const y=rand(1,6);
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=randNonZero(1,4);
      const b2=randNonZero(1,4);
      const c2=a2*x+b2*y;
      const tested=pair(x,y);
      const correct='Sí, satisface ambas';
      const ds=['No, falla en la primera','No, falla en la segunda','No, falla en ambas'];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Verificar solución', t:45,
        q:`¿El par <strong>${tested}</strong> es solución del sistema?`,
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 18 · ¿Cuál par es solución? · 60s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,5);
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=randNonZero(1,4);
      const b2=randNonZero(1,4);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(y,x);
      const w2=pair(x+1,y);
      const w3=pair(x,y-1);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Verificar solución', t:60,
        q:'¿Cuál par ordenado es la solución del sistema?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 19 · Verificar con valor negativo · 60s */
    ()=>{
      const x=-rand(1,4);
      const y=rand(1,5);
      const a1=randNonZero(1,3);
      const b1=randNonZero(1,3);
      const c1=a1*x+b1*y;
      const a2=randNonZero(1,3);
      const b2=randNonZero(1,3);
      const c2=a2*x+b2*y;
      const correct=pair(x,y);
      const w1=pair(-x,y);                      // signo equivocado
      const w2=pair(x,-y);
      const w3=pair(y,x);
      const {opciones,correcta}=makeOpts(correct,[w1,w2,w3]);
      return{ cat:'Verificar solución', t:60,
        q:'¿Cuál par ordenado satisface ambas ecuaciones?',
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    },

    /* 20 · ¿Es (x,y) solución? — caso negativo (no lo es) · 60s */
    ()=>{
      const x=rand(1,5);
      const y=rand(1,5);
      const a1=randNonZero(1,4);
      const b1=randNonZero(1,4);
      const c1=a1*x+b1*y;
      const a2=randNonZero(1,4);
      const b2=randNonZero(1,4);
      const c2=a2*x+b2*y;
      // Probaremos un par CERCANO pero que no satisface
      let tx=x+rand(-1,1), ty=y+rand(-1,1);
      while((tx===x && ty===y)||(a1*tx+b1*ty===c1 && a2*tx+b2*ty===c2)){
        tx=x+rand(-2,2); ty=y+rand(-2,2);
      }
      const sat1=(a1*tx+b1*ty===c1);
      const sat2=(a2*tx+b2*ty===c2);
      let correct;
      if(sat1 && sat2) correct='Sí, satisface ambas';
      else if(!sat1 && sat2) correct='No, falla en la primera';
      else if(sat1 && !sat2) correct='No, falla en la segunda';
      else correct='No, falla en ambas';
      const tested=pair(tx,ty);
      const all=['Sí, satisface ambas','No, falla en la primera','No, falla en la segunda','No, falla en ambas'];
      const ds=all.filter(x=>x!==correct);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Verificar solución', t:60,
        q:`¿El par <strong>${tested}</strong> es solución del sistema?`,
        math:systemHTML(a1,b1,c1,a2,b2,c2),
        opciones, correcta };
    }

  ]; // fin GEN

  /* ─── GENERAR Y MEZCLAR PREGUNTAS ─── */
  const preguntas=shuffle(GEN.map(g=>g()));
  const total=preguntas.length;
  let actual=0, puntos=0, respondida=false, reloj=null, segs=0;
  const catPts={}, catTot={};
  preguntas.forEach(p=>{ catTot[p.cat]=(catTot[p.cat]||0)+1; catPts[p.cat]=catPts[p.cat]||0; });

  const qArea=document.getElementById('question-area');
  const barP=document.getElementById('progress-bar');
  const txtP=document.getElementById('progress-text');

  /* ─── RENDERIZAR PREGUNTA ─── */
  function render(i){
    const p=preguntas[i];
    const col=CC[p.cat]||'#0089cd';
    const icon=CI[p.cat]||'📝';
    const tLabel= p.t<=45?'⚡ Rápida': p.t<=75?'🕐 Media':'⏳ Difícil';
    const opHtml=p.opciones.map(o=>
      `<div class="option-item" data-val="${o.valor}" onclick="window.__qClick(this)">${o.texto}</div>`
    ).join('');
    const mathBlock=p.math?`<div class="math-box">${p.math}</div>`:'';
    const btnLbl=i===total-1?'Ver resultados':'Siguiente ›';
    qArea.innerHTML=`
      <div class="question-meta">
        <span class="cat-badge" style="background:${col}">${icon} ${p.cat}</span>
        <span class="time-badge">${tLabel} · ${p.t}s</span>
      </div>
      <div class="question-header">${p.q}</div>
      ${mathBlock}
      <div class="options">${opHtml}</div>
      <div class="btn-container">
        <div class="primary-btn" onclick="window.__qNext()">${btnLbl}</div>
      </div>`;
    if(barP) barP.style.width=((i+1)/total*100)+'%';
    if(txtP) txtP.textContent=`Pregunta ${i+1} de ${total}`;
    iniciarReloj(p.t);
  }

  /* ─── CLICK OPCIÓN ─── */
  window.__qClick=function(el){
    if(respondida) return;
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const elegida=el.getAttribute('data-val');
    if(elegida===p.correcta){
      el.className='option-item correct disabled';
      puntos++; catPts[p.cat]++;
    } else {
      el.className='option-item incorrect disabled';
      const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
      if(ok) ok.className='option-item correct disabled';
    }
    qArea.querySelectorAll('.option-item').forEach(o=>{
      if(!o.className.includes('disabled')) o.className+=' disabled';
    });
  };

  /* ─── SIGUIENTE ─── */
  window.__qNext=function(){
    pararReloj(); actual++; respondida=false;
    if(actual<total) render(actual);
    else mostrarResultados();
  };

  /* ─── TEMPORIZADOR ─── */
  function iniciarReloj(s){
    pararReloj(); segs=s; actualizarReloj();
    reloj=setInterval(()=>{ segs--; actualizarReloj(); if(segs<=0) tiempoAgotado(); },1000);
  }
  function pararReloj(){ if(reloj){clearInterval(reloj);reloj=null;} }
  function actualizarReloj(){
    const p=preguntas[actual]||{t:60};
    const tt=document.getElementById('timer-text');
    const tb=document.getElementById('timer-bar');
    const tc=document.getElementById('timer-container');
    if(tt) tt.textContent=`⏱ Tiempo: ${segs}s`;
    const pct=(segs/p.t)*100;
    if(tb){
      tb.style.width=pct+'%';
      if(pct<=25){ tb.style.background='#dc3545'; if(tc) tc.className='timer-container timer-warning'; }
      else if(pct<=50){ tb.style.background='linear-gradient(90deg,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
      else{ tb.style.background='linear-gradient(90deg,#28a745,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
    }
  }
  function tiempoAgotado(){
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
    if(ok) ok.className='option-item correct disabled';
    qArea.querySelectorAll('.option-item').forEach(o=>{ if(!o.className.includes('disabled')) o.className+=' disabled'; });
    const tt=document.getElementById('timer-text');
    if(tt) tt.textContent='⏰ ¡Tiempo agotado!';
    const tc=document.getElementById('timer-container');
    if(tc) tc.className='timer-container timer-warning';
  }

  /* ─── RESULTADOS ─── */
  function mostrarResultados(){
    pararReloj();
    qArea.innerHTML='';
    document.getElementById('timer-container').style.display='none';
    const pct=Math.round(puntos/total*100);
    document.getElementById('final-score').textContent=`${puntos} / ${total}  (${pct}%)`;
    let msg='', emoji='';
    if(pct>=85){ emoji='🏆'; msg='¡Excelente! Dominas los sistemas de ecuaciones del GED. ¡Estás listo!'; }
    else if(pct>=70){ emoji='👍'; msg='¡Muy bien! Un poco más de práctica y lo logras.'; }
    else if(pct>=50){ emoji='💪'; msg='Buen intento. Repasa las categorías en rojo y vuelve a intentarlo.'; }
    else { emoji='📚'; msg='Sigue practicando. Identifica las categorías débiles y trabaja en ellas primero.'; }
    document.getElementById('final-msg').textContent=emoji+' '+msg;

    let html='<h3>Resultados por categoría:</h3>';
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat];
      const p2=Math.round(s/t2*100);
      const col=CC[cat]||'#0089cd';
      const barCol=p2>=70?col:'#e53935';
      html+=`<div class="cat-row">
        <span class="cat-lbl">${CI[cat]} ${cat}</span>
        <div class="cat-bar-out"><div class="cat-bar-in" style="width:${p2}%;background:${barCol}"></div></div>
        <span class="cat-sc">${s}/${t2}</span>
      </div>`;
    }
    document.getElementById('cat-results').innerHTML=html;

    let minCat='', minPct=999;
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat], pp=s/t2;
      if(pp<minPct){ minPct=pp; minCat=cat; }
    }
    document.getElementById('tip-box').textContent=
      minPct<1 ? (TIPS[minCat]||'') : '✅ ¡Sin categorías con puntuación 0! Sigue practicando para mejorar los tiempos.';

    document.getElementById('result-screen').className='result-screen';
    document.querySelector('.quiz-progress-header').style.display='none';
    document.getElementById('restart-btn').onclick=()=>window.location.reload();
  }

  /* ─── ARRANQUE ─── */
  render(0);

})();
</script>
</body>
</html>
