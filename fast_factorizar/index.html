    <style>

  <body>
    <div id="quiz-container">
      <div class="quiz-progress-header">
        <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
      </div>
      <div id="question-area"></div>
      <div class="timer-container" id="timer-container">
        <div class="timer-text" id="timer-text">&#9201; Tiempo: 40s</div>
        <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
      </div>
      <div class="result-screen hidden" id="result-screen">
        <h2>&#127919; &iexcl;Cuestionario completado!</h2>
        <p class="result-score" id="final-score"></p>
        <p class="result-msg" id="final-msg"></p>
        <div class="cat-results" id="cat-results"></div>
        <div class="tip-box" id="tip-box"></div>
        <div class="btn-container" style="padding-top:14px">
          <div class="primary-btn" id="restart-btn">&#128260; Nuevas preguntas (reiniciar)</div>
        </div>
      </div>
      <p class="creditos">
        Creado por Jos&eacute; M. Fern&aacute;ndez, ABE/ASE Math Master Teacher, Harry S. Truman College &mdash; City Colleges of Chicago.<br>
        Licencia <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a>.
      </p>
    </div>

    <script>
    (function () {
      if (window.quizFactorialIniciado) return;
      window.quizFactorialIniciado = true;

      /* ── UTILS ── */
      function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      const M2 = '\u2212';   /* signo menos */
      const SQ = '\u00b2';   /* al cuadrado */

      /* ── FORMATEADORES DE EXPRESIONES ── */
      function bin(a) { return 'x ' + (a > 0 ? '+' : M2) + ' ' + Math.abs(a); } /* "x + 3" / "x - 3" */
      function coefX(p) { return p === 1 ? 'x' : p + 'x'; }
      function fmtBX(b) {
        if (b === 0) return '';
        const s = b > 0 ? ' + ' : ' ' + M2 + ' ';
        const m = Math.abs(b);
        return s + (m === 1 ? '' : m) + 'x';
      }
      function fmtC(c) {
        if (c === 0) return '';
        return (c > 0 ? ' + ' : ' ' + M2 + ' ') + Math.abs(c);
      }
      function tri(b, c) { return 'x' + SQ + fmtBX(b) + fmtC(c); } /* x^2 (+/- bx) (+/- c) */

      /* ── OPCIONES DE TEXTO ──
         Cada generador entrega al menos 3 distractores distintos de la respuesta
         correcta; de lo contrario makeOptsText devolveria menos de 4 opciones. */
      function makeOptsText(ok, dist) {
        const seen = new Set([ok]), uniq = [];
        for (const d of dist) { if (!seen.has(d) && uniq.length < 3) { seen.add(d); uniq.push(d); } }
        const all = shuffle([ok, ...uniq]);
        const L = ['a', 'b', 'c', 'd'];
        return { opciones: all.map((v, i) => ({ valor: L[i], texto: L[i].toUpperCase() + '. ' + v })), correcta: L[all.indexOf(ok)] };
      }

      /* ── caja con la expresion grande ── */
      function cajaExpr(txt) {
        return '<div class="data-box"><span class="expr-grande">' + txt + '</span></div>';
      }

      /* ══════════════════════════════════════ CATEGORIAS ══════════════════════════════════════ */
      const CC = {
        'Factor com\u00fan':                 '#0f766e',
        'Diferencia de cuadrados':           '#1d4ed8',
        'Trinomio cuadrado perfecto':        '#9a3412',
        ['Trinomio x' + SQ + ' + bx + c']:   '#6d28d9',
        'Identifica el m\u00e9todo':         '#166534'
      };
      const CI = {
        'Factor com\u00fan':                 'a( )',
        'Diferencia de cuadrados':           'a' + SQ + M2 + 'b' + SQ,
        'Trinomio cuadrado perfecto':        '( )' + SQ,
        ['Trinomio x' + SQ + ' + bx + c']:   '( )( )',
        'Identifica el m\u00e9todo':         '?'
      };
      const TIPS = {
        'Factor com\u00fan':
          'Saca el m\u00e1ximo factor com\u00fan (n\u00famero Y variable) de TODOS los t\u00e9rminos. En 2x' + SQ + ' + 6x el factor com\u00fan es 2x, y queda 2x(x + 3). Comprueba multiplicando de vuelta.',
        'Diferencia de cuadrados':
          'a' + SQ + ' ' + M2 + ' b' + SQ + ' = (a + b)(a ' + M2 + ' b): un binomio con + y otro con ' + M2 + '. Ojo: una SUMA de cuadrados (x' + SQ + ' + 9) NO se factoriza con n\u00fameros reales.',
        'Trinomio cuadrado perfecto':
          'Si el primero y el \u00faltimo son cuadrados perfectos y el del medio es el doble producto, es un cuadrado: x' + SQ + ' + 6x + 9 = (x + 3)' + SQ + '. El signo del medio decide el signo del binomio.',
        ['Trinomio x' + SQ + ' + bx + c']:
          'Busca dos n\u00fameros que MULTIPLIQUEN c y SUMEN b. Para x' + SQ + ' + 5x + 6: 2 y 3 (2\u00b73 = 6, 2 + 3 = 5), as\u00ed que (x + 2)(x + 3). Cuida los signos.',
        'Identifica el m\u00e9todo':
          'Primero saca factor com\u00fan. Luego mira: dos t\u00e9rminos con ' + M2 + ' \u2192 diferencia de cuadrados; tres t\u00e9rminos \u2192 trinomio (revisa si es cuadrado perfecto).'
      };

      /* ══════════════════════════════════════
         GENERADORES — 20 preguntas (4 por categoria)
         ══════════════════════════════════════ */

      /* CAT 1A — Factor comun numerico:  (g*m)x + (g*n)  ->  g(m x + n) */
      function fcNum(g, m, n) {
        return () => {
          const o = makeOptsText(g + '(' + m + 'x + ' + n + ')',
            [g + '(' + m + 'x + ' + (g * n) + ')',
             g + '(' + (g * m) + 'x + ' + n + ')',
             (g * m) + '(x + ' + n + ')']);
          return { cat: 'Factor com\u00fan', t: 40,
            q: 'Factoriza por factor com\u00fan:', data: cajaExpr((g * m) + 'x + ' + (g * n)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 1B — Factor comun con variable:  (g*p)x^2 + (g*q)x  ->  gx(p x + q) */
      function fcVar(g, p, q) {
        return () => {
          const gx = (g === 1 ? 'x' : g + 'x');
          const o = makeOptsText(gx + '(' + coefX(p) + ' + ' + q + ')',
            ['x(' + (g * p) + 'x + ' + (g * q) + ')',
             g + '(' + (p === 1 ? 'x' + SQ : p + 'x' + SQ) + ' + ' + coefX(q) + ')',
             gx + '(' + coefX(p) + ' + ' + (g * q) + ')']);
          return { cat: 'Factor com\u00fan', t: 42,
            q: 'Factoriza por factor com\u00fan:', data: cajaExpr((g * p) + 'x' + SQ + ' + ' + (g * q) + 'x'),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 2A — Diferencia de cuadrados:  x^2 - a^2  ->  (x + a)(x - a) */
      function difCuad(aMin, aMax) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText('(' + bin(a) + ')(' + bin(-a) + ')',
            ['(' + bin(a) + ')(' + bin(a) + ')',
             '(' + bin(-a) + ')(' + bin(-a) + ')',
             'No se puede factorizar']);
          return { cat: 'Diferencia de cuadrados', t: 40,
            q: 'Factoriza la diferencia de cuadrados:', data: cajaExpr('x' + SQ + ' ' + M2 + ' ' + (a * a)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 2B — Diferencia de cuadrados con coeficiente:  (cx)^2 - a^2 */
      function difCuadC(c, a) {
        return () => {
          const o = makeOptsText('(' + c + 'x + ' + a + ')(' + c + 'x ' + M2 + ' ' + a + ')',
            ['(' + c + 'x + ' + a + ')' + SQ,
             '(' + c + 'x ' + M2 + ' ' + a + ')' + SQ,
             'No se puede factorizar']);
          return { cat: 'Diferencia de cuadrados', t: 45,
            q: 'Factoriza la diferencia de cuadrados:', data: cajaExpr((c * c) + 'x' + SQ + ' ' + M2 + ' ' + (a * a)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 3 — Trinomio cuadrado perfecto:  x^2 +/- 2a x + a^2  ->  (x +/- a)^2 */
      function tcp(aMin, aMax, s) {
        return () => {
          const a = rand(aMin, aMax);
          const o = makeOptsText('(' + bin(s * a) + ')' + SQ,
            ['(' + bin(s * a) + ')(' + bin(-s * a) + ')',
             '(' + bin(-s * a) + ')' + SQ,
             '(x + 1)(' + bin(s * a * a) + ')']);
          return { cat: 'Trinomio cuadrado perfecto', t: 45,
            q: 'Factoriza el trinomio cuadrado perfecto:', data: cajaExpr(tri(s * 2 * a, a * a)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 4 — Trinomio x^2 + bx + c:  (x + p)(x + q) */
      function trin(p, q, wp) {
        return () => {
          const o = makeOptsText('(' + bin(p) + ')(' + bin(q) + ')',
            ['(' + bin(-p) + ')(' + bin(-q) + ')',
             '(' + bin(p) + ')(' + bin(-q) + ')',
             '(' + bin(wp[0]) + ')(' + bin(wp[1]) + ')']);
          return { cat: 'Trinomio x' + SQ + ' + bx + c', t: 50,
            q: 'Factoriza el trinomio:', data: cajaExpr(tri(p + q, p * q)),
            opciones: o.opciones, correcta: o.correcta };
        };
      }
      /* CAT 5 — Identifica el metodo (las opciones son los nombres de los metodos) */
      const METODOS = ['Factor com\u00fan', 'Diferencia de cuadrados', 'Trinomio cuadrado perfecto', 'Trinomio de la forma x' + SQ + ' + bx + c'];
      function metodo(expr, ok) {
        return () => {
          const o = makeOptsText(ok, METODOS.filter(m => m !== ok));
          return { cat: 'Identifica el m\u00e9todo', t: 35,
            q: '\u00bfQu\u00e9 m\u00e9todo conviene usar para factorizar?', data: cajaExpr(expr),
            opciones: o.opciones, correcta: o.correcta };
        };
      }

      const GEN = [
        fcNum(3, 2, 3), fcVar(2, 1, 3), fcNum(5, 2, 3), fcVar(3, 1, 2),
        difCuad(2, 5), difCuad(6, 8), difCuad(9, 11), difCuadC(2, 3),
        tcp(2, 4, 1), tcp(5, 7, 1), tcp(2, 4, -1), tcp(5, 8, -1),
        trin(2, 3, [1, 6]), trin(3, -2, [6, -1]), trin(-2, -3, [-1, -6]), trin(4, -3, [6, -2]),
        metodo('x' + SQ + ' ' + M2 + ' 49', 'Diferencia de cuadrados'),
        metodo('6x + 15', 'Factor com\u00fan'),
        metodo('x' + SQ + ' + 10x + 25', 'Trinomio cuadrado perfecto'),
        metodo('x' + SQ + ' + 7x + 10', 'Trinomio de la forma x' + SQ + ' + bx + c')
      ];

      /* ── MOTOR ── */
      const preguntas = shuffle(GEN.map(g => g()));
      const total = preguntas.length;
      let actual = 0, puntos = 0, respondida = false, reloj = null, segs = 0;
      const catPts = {}, catTot = {};
      preguntas.forEach(p => {
        catTot[p.cat] = (catTot[p.cat] || 0) + 1;
        catPts[p.cat] = catPts[p.cat] || 0;
      });

      const qArea = document.getElementById('question-area');
      const barP = document.getElementById('progress-bar');
      const txtP = document.getElementById('progress-text');

      function render(i) {
        const p = preguntas[i];
        const col = CC[p.cat] || '#0f766e';
        const icon = CI[p.cat] || '';
        const tLbl = p.t <= 40 ? '&#9889; R\u00e1pida' : p.t <= 46 ? '&#128336; Media' : '&#9203; Compleja';
        const opHtml = p.opciones.map(o =>
          '<div class="option-item" data-val="' + o.valor + '" onclick="window.__dfClick(this)">' + o.texto + '</div>'
        ).join('');
        const dH = p.data ? p.data : '';
        const btn = i === total - 1 ? 'Ver resultados' : 'Siguiente &rsaquo;';
        qArea.innerHTML =
          '<div class="question-meta">' +
            '<span class="cat-badge" style="background:' + col + '"><span aria-hidden="true">' + icon + '</span> ' + p.cat + '</span>' +
            '<span class="time-badge">' + tLbl + ' &middot; ' + p.t + 's</span>' +
          '</div>' +
          '<div class="question-header">' + p.q + '</div>' +
          dH +
          '<div class="options">' + opHtml + '</div>' +
          '<div class="btn-container"><div class="primary-btn" onclick="window.__dfNext()">' + btn + '</div></div>';
        if (barP) barP.style.width = ((i + 1) / total) * 100 + '%';
        if (txtP) txtP.textContent = 'Pregunta ' + (i + 1) + ' de ' + total;
        iniciarReloj(p.t);
      }

      window.__dfClick = function (el) {
        if (respondida) return;
        pararReloj();
        respondida = true;
        const p = preguntas[actual];
        const elegida = el.getAttribute('data-val');
        if (elegida === p.correcta) {
          el.className = 'option-item correct disabled';
          puntos++;
          catPts[p.cat]++;
        } else {
          el.className = 'option-item incorrect disabled';
          const ok = qArea.querySelector('.option-item[data-val="' + p.correcta + '"]');
          if (ok) ok.className = 'option-item correct disabled';
        }
        qArea.querySelectorAll('.option-item').forEach(o => {
          if (!o.className.includes('disabled')) o.className += ' disabled';
        });
      };

      window.__dfNext = function () {
        pararReloj();
        actual++;
        respondida = false;
        if (actual < total) render(actual);
        else mostrarRes();
      };

      function iniciarReloj(s) {
        pararReloj();
        segs = s;
        updReloj();
        reloj = setInterval(() => { segs--; updReloj(); if (segs <= 0) tAgotado(); }, 1000);
      }
      function pararReloj() { if (reloj) { clearInterval(reloj); reloj = null; } }
      function updReloj() {
        const p = preguntas[actual] || { t: 40 };
        const tt = document.getElementById('timer-text');
        const tb = document.getElementById('timer-bar');
        const tc = document.getElementById('timer-container');
        if (tt) tt.textContent = '\u23F1 Tiempo: ' + segs + 's';
        const pct = (segs / p.t) * 100;
        if (tb) {
          tb.style.width = pct + '%';
          if (pct <= 25) {
            tb.style.background = '#dc3545';
            if (tc) tc.className = 'timer-container timer-warning';
          } else if (pct <= 50) {
            tb.style.background = 'linear-gradient(90deg,#ffc107,#dc3545)';
            if (tc) tc.className = 'timer-container';
          } else {
            tb.style.background = 'linear-gradient(90deg,#28a745,#ffc107,#dc3545)';
            if (tc) tc.className = 'timer-container';
          }
        }
      }
      function tAgotado() {
        pararReloj();
        respondida = true;
        const p = preguntas[actual];
        const ok = qArea.querySelector('.option-item[data-val="' + p.correcta + '"]');
        if (ok) ok.className = 'option-item correct disabled';
        qArea.querySelectorAll('.option-item').forEach(o => {
          if (!o.className.includes('disabled')) o.className += ' disabled';
        });
        const tt = document.getElementById('timer-text');
        if (tt) tt.textContent = '\u23F0 \u00a1Tiempo agotado!';
        const tc = document.getElementById('timer-container');
        if (tc) tc.className = 'timer-container timer-warning';
      }

      function mostrarRes() {
        pararReloj();
        qArea.innerHTML = '';
        document.getElementById('timer-container').style.display = 'none';
        const pct = Math.round((puntos / total) * 100);
        document.getElementById('final-score').textContent = puntos + ' / ' + total + '  (' + pct + '%)';
        let msg = pct >= 85 ? '\u{1F3C6} \u00a1Excelente! Factorizas con soltura; eso te dar\u00e1 ventaja al resolver ecuaciones.'
                : pct >= 70 ? '\u{1F44D} \u00a1Muy bien! Repasa las categor\u00edas marcadas en rojo.'
                : pct >= 50 ? '\u{1F4AA} Buen intento. Identifica primero el M\u00c9TODO y comprueba multiplicando de vuelta.'
                : '\u{1F4DA} Sigue practicando: factor com\u00fan primero, luego reconoce el patr\u00f3n (diferencia o trinomio).';
        document.getElementById('final-msg').textContent = msg;

        let html = '<h3>Desglose por categor\u00eda</h3>';
        for (const cat of Object.keys(catTot)) {
          const s = catPts[cat] || 0;
          const t2 = catTot[cat];
          const p2 = Math.round((s / t2) * 100);
          const col = CC[cat] || '#0f766e';
          html +=
            '<div class="cat-row">' +
              '<span class="cat-lbl"><span aria-hidden="true">' + CI[cat] + '</span> ' + cat + '</span>' +
              '<div class="cat-bar-out"><div class="cat-bar-in" style="width:' + p2 + '%;background:' + col + '"></div></div>' +
              '<span class="cat-sc">' + s + '/' + t2 + ' \u2713</span>' +
            '</div>';
        }
        document.getElementById('cat-results').innerHTML = html;
        let minCat = '', minPct = 999;
        for (const cat of Object.keys(catTot)) {
          const pp = (catPts[cat] || 0) / catTot[cat];
          if (pp < minPct) { minPct = pp; minCat = cat; }
        }
        document.getElementById('tip-box').innerHTML = minPct < 1
          ? '<strong>\u{1F4CC} Para mejorar en \u00ab' + minCat + '\u00bb:</strong><br>' + (TIPS[minCat] || '')
          : '\u2705 \u00a1Sin categor\u00edas con cero! Ahora intenta mejorar tus tiempos.';
        document.getElementById('result-screen').className = 'result-screen';
        document.querySelector('.quiz-progress-header').style.display = 'none';
        document.getElementById('restart-btn').onclick = () => window.location.reload();
      }

      render(0);
    })();
    </script>
  </body>
</html>
